<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>STREAM LAYOUT — ONE WEEK NON STOP BRAINROOT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:1280px;height:720px;
  overflow:hidden;background:#040412;
  color:#fff;font-family:'Courier New',monospace;
}

/* ══ HEADER 48px ══ */
#hdr{
  position:absolute;top:0;left:0;width:1280px;height:48px;
  background:linear-gradient(90deg,#06061E,#0C0C30 50%,#06061E);
  border-bottom:2px solid #FFD700;
  display:flex;align-items:center;padding:0 14px;gap:10px;z-index:100;
}
.live{background:#FF0000;color:#fff;font-size:10px;font-weight:bold;padding:2px 8px;border-radius:3px;letter-spacing:1.5px;animation:lp 1.4s ease-in-out infinite;}
@keyframes lp{0%,100%{opacity:1;}50%{opacity:.6;}}
.htitle{font-size:12px;font-weight:bold;color:#FFD700;letter-spacing:2.5px;flex:1;white-space:nowrap;text-shadow:0 0 10px rgba(255,215,0,.3);}
.hstat{display:flex;flex-direction:column;align-items:center;}
.hsl{font-size:7px;color:#444;letter-spacing:1px;}
.hsv{font-size:14px;font-weight:bold;color:#FFD700;line-height:1.1;}
.hdiv{width:1px;height:26px;background:rgba(255,255,255,.08);}
.hnxt{display:flex;align-items:center;gap:5px;}
.hnl{font-size:7px;color:#444;}
.hni{width:30px;height:30px;object-fit:contain;border-radius:3px;}
.hsaw{background:rgba(255,200,0,.12);border:1px solid rgba(255,200,0,.3);color:#FFD700;font-size:9px;font-weight:bold;padding:2px 8px;border-radius:20px;letter-spacing:.5px;white-space:nowrap;animation:sawp 3s ease-in-out infinite;}
@keyframes sawp{0%,100%{opacity:.75;}50%{opacity:1;background:rgba(255,200,0,.2);}}
.hstats{display:flex;gap:14px;align-items:center;}

/* ══ LEFT PANEL 210px ══ */
#left{
  position:absolute;top:48px;left:0;width:210px;height:620px;
  background:#06061A;border-right:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;z-index:50;
}
/* ══ RIGHT PANEL 210px ══ */
#right{
  position:absolute;top:48px;right:0;width:210px;height:620px;
  background:#06061A;border-left:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;z-index:50;
}
/* Panel header */
.phdr{
  height:26px;flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:0 9px;font-size:8px;letter-spacing:1.5px;color:#333;
  border-bottom:1px solid rgba(255,255,255,.05);
}
/* iframes fill their container */
.fw{flex:1;overflow:hidden;position:relative;}
.fw iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:transparent;}

/* QR panel */
.qrp{
  flex-shrink:0;height:150px;border-top:1px solid rgba(255,215,0,.12);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
}
.qrbox{width:104px;height:104px;background:#fff;border-radius:6px;padding:3px;position:relative;box-shadow:0 0 14px rgba(255,215,0,.2);}
.qrbox::after{content:'';position:absolute;inset:0;border-radius:6px;box-shadow:inset 0 0 0 2px #FFD700;}
.qrbox img{width:100%;height:100%;display:block;border-radius:3px;}
.qrl{font-size:8px;color:#FFD700;letter-spacing:.5px;}
.qrs{font-size:7px;color:#444;}

/* game stats */
.gstats{flex-shrink:0;padding:6px 9px;border-top:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;gap:4px;}
.gs{display:flex;justify-content:space-between;}
.gsl{font-size:8px;color:#333;letter-spacing:1px;}
.gsv{font-size:11px;font-weight:bold;color:#FFD700;}

/* next items */
.nxtp{flex-shrink:0;padding:7px 9px;border-top:1px solid rgba(255,255,255,.05);}
.nxtl{font-size:7px;color:#333;letter-spacing:1.5px;margin-bottom:5px;}
.nxtr{display:flex;gap:5px;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:5px;padding:4px 2px;}
.ni{width:52px;height:52px;object-fit:contain;}
.nn{font-size:7px;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62px;text-align:center;}
.nl{font-size:6px;color:#1A1A44;}

/* merge log */
.loghdr{flex-shrink:0;height:24px;display:flex;align-items:center;gap:4px;padding:0 8px;font-size:8px;color:#333;letter-spacing:1.5px;border-top:1px solid rgba(255,255,255,.05);}
#mlog{flex:1;overflow:hidden;padding:4px 7px;display:flex;flex-direction:column;gap:2px;justify-content:flex-end;}
.mle{font-size:9.5px;line-height:1.3;border-bottom:1px solid rgba(255,255,255,.03);padding:1px 0;animation:mlin .2s ease;}
@keyframes mlin{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ══ GAME IFRAME CENTER ══ */
#game-wrap{
  position:absolute;top:48px;left:210px;width:860px;height:620px;
  overflow:hidden;background:#07071C;
}
#game-frame{width:100%;height:100%;border:none;display:block;}

/* mediashare overlay (on top of game iframe) */
#ms-wrap{
  position:absolute;top:48px;left:210px;width:860px;height:200px;
  pointer-events:none;z-index:60;
}
#ms-frame{width:100%;height:100%;border:none;background:transparent;}

/* ══ FOOTER 52px ══ */
#ftr{
  position:absolute;bottom:0;left:0;width:1280px;height:52px;
  background:#050516;border-top:1px solid rgba(255,215,0,.1);
  display:flex;align-items:center;z-index:100;
}
/* recent donations compact in footer */
#ftr-rec{flex-shrink:0;width:270px;height:52px;overflow:hidden;position:relative;border-right:1px solid rgba(255,255,255,.05);}
#ftr-rec iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:transparent;}
/* tier scroll */
.tscroll-wrap{
  flex:1;overflow:hidden;
  mask-image:linear-gradient(90deg,transparent,#000 20px,#000 calc(100% - 20px),transparent);
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 20px,#000 calc(100% - 20px),transparent);
}
.tscroll{display:flex;gap:5px;white-space:nowrap;animation:ts 85s linear infinite;}
@keyframes ts{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.tp{display:inline-flex;align-items:center;gap:2px;padding:2px 8px;border-radius:20px;font-size:8px;flex-shrink:0;border:1px solid;opacity:.75;}
/* soundboard in footer right */
#ftr-sb{flex-shrink:0;width:120px;height:52px;overflow:hidden;position:relative;border-left:1px solid rgba(255,255,255,.05);}
#ftr-sb iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:transparent;}

/* ══ WHEEL OVERLAY ══ */
#whl-wrap{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,12,.82);z-index:500;
  align-items:center;justify-content:center;
  backdrop-filter:blur(5px);
}
#whl-wrap.show{display:flex;}
#whl-box{width:520px;height:540px;background:#080822;border:2px solid #FFD700;border-radius:14px;overflow:hidden;position:relative;box-shadow:0 0 60px rgba(255,215,0,.2);}
#whl-frame{width:100%;height:480px;border:none;display:block;}
.whl-foot{font-size:9px;color:#333;text-align:center;padding:6px;letter-spacing:1px;}
.whl-x{position:absolute;top:8px;right:10px;background:none;border:none;color:#FFD700;font-size:20px;cursor:pointer;z-index:10;opacity:.6;}
.whl-x:hover{opacity:1;}

/* buttons */
#whl-btn{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(255,200,0,.1);border:1px solid rgba(255,200,0,.3);color:#FFD700;font-size:9px;padding:4px 13px;border-radius:20px;cursor:pointer;z-index:999;font-family:monospace;}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <span class="live">● LIVE</span>
  <span class="htitle">⚡ ONE WEEK NON STOP STREAM BRAINROOT ⚡</span>
  <div class="hstats">
    <div class="hstat"><span class="hsl">SCORE</span><span class="hsv" id="H-SC">0</span></div>
    <div class="hdiv"></div>
    <div class="hstat"><span class="hsl">BEST</span><span class="hsv" id="H-BT">—</span></div>
    <div class="hdiv"></div>
    <div class="hstat"><span class="hsl">MERGE</span><span class="hsv" id="H-MG">0</span></div>
    <div class="hdiv"></div>
    <div class="hstat"><span class="hsl">TIER MAX</span><span class="hsv" id="H-MT">—</span></div>
  </div>
  <div class="hnxt">
    <span class="hnl">NEXT</span>
    <img id="H-NI" class="hni" src="" alt="">
    <span class="hnl">→</span>
    <img id="H-AI" class="hni" src="" alt="">
  </div>
  <div class="hsaw">🌸 SAWERIA</div>
</div>

<!-- LEFT PANEL -->
<div id="left">
  <div class="phdr">🏆 LEADERBOARD DONASI</div>
  <div class="fw">
    <iframe src="https://saweria.co/widgets/leaderboard?streamKey=6d063565f9f30af0c7fbc25606599d3d" scrolling="no" allowtransparency="true" allow="autoplay"></iframe>
  </div>
  <div class="qrp">
    <div class="qrbox"><img src="https://saweria.co/widgets/qr?streamKey=6d063565f9f30af0c7fbc25606599d3d" alt="QR Saweria" loading="lazy"></div>
    <div class="qrl">🌸 SCAN TO DONATE</div>
    <div class="qrs">saweria.co/oktetod</div>
  </div>
  <div class="gstats">
    <div class="gs"><span class="gsl">ITEMS</span><span class="gsv" id="G-IT">0</span></div>
    <div class="gs"><span class="gsl">SESSION</span><span class="gsv" id="G-SS">00:00</span></div>
    <div class="gs"><span class="gsl">GAMES</span><span class="gsv" id="G-GP">0</span></div>
  </div>
</div>

<!-- GAME IFRAME -->
<div id="game-wrap">
  <!-- ▼▼▼ GANTI URL INI DENGAN URL VERCEL KAMU ▼▼▼ -->
  <iframe id="game-frame" src="https://brainroot-three.vercel.app" allow="autoplay" allowtransparency="true"></iframe>
</div>

<!-- MEDIASHARE overlay di atas game -->
<div id="ms-wrap">
  <iframe id="ms-frame" src="https://saweria.co/widgets/mediashare?streamKey=6d063565f9f30af0c7fbc25606599d3d" scrolling="no" allowtransparency="true" allow="autoplay;fullscreen"></iframe>
</div>

<!-- RIGHT PANEL -->
<div id="right">
  <div class="phdr">🌸 DONASI TERBARU</div>
  <div class="fw" style="flex:0 0 210px;">
    <iframe src="https://saweria.co/widgets/recent?streamKey=6d063565f9f30af0c7fbc25606599d3d" scrolling="no" allowtransparency="true" allow="autoplay"></iframe>
  </div>
  <div class="nxtp">
    <div class="nxtl">NEXT ITEMS</div>
    <div class="nxtr">
      <div class="nb"><img id="S-NI" class="ni" src="" alt=""><div class="nn" id="S-NN">—</div><div class="nl">NEXT</div></div>
      <div class="nb"><img id="S-AI" class="ni" src="" alt=""><div class="nn" id="S-AN">—</div><div class="nl">AFTER</div></div>
    </div>
  </div>
  <div class="loghdr">⚡ MERGE LOG</div>
  <div id="mlog"></div>
</div>

<!-- FOOTER -->
<div id="ftr">
  <div id="ftr-rec">
    <iframe src="https://saweria.co/widgets/recent?streamKey=6d063565f9f30af0c7fbc25606599d3d" scrolling="no" allowtransparency="true" allow="autoplay"></iframe>
  </div>
  <div class="tscroll-wrap"><div class="tscroll" id="tscroll"></div></div>
  <div id="ftr-sb">
    <iframe src="https://saweria.co/widgets/soundboard?streamKey=6d063565f9f30af0c7fbc25606599d3d" scrolling="no" allowtransparency="true" allow="autoplay"></iframe>
  </div>
</div>

<!-- WHEEL -->
<div id="whl-wrap" onclick="if(event.target===this)this.classList.remove('show')">
  <div id="whl-box">
    <button class="whl-x" onclick="document.getElementById('whl-wrap').classList.remove('show')">✕</button>
    <iframe id="whl-frame" src="https://saweria.co/widgets/wheel?streamKey=6d063565f9f30af0c7fbc25606599d3d" scrolling="no" allowtransparency="true" allow="autoplay"></iframe>
    <div class="whl-foot">KLIK DI LUAR UNTUK TUTUP</div>
  </div>
</div>

<div id="whl-btn" onclick="document.getElementById('whl-wrap').classList.add('show')">🎡 WHEEL</div>

<script>
// ══════════════════════════════════════════════
//  TIER DATA (untuk next preview & footer)
// ══════════════════════════════════════════════
const TD=[
  {t:1,n:"Lemonkucing",img:"",c:"#FFD700"},{t:2,n:"Mangosapi",img:"",c:"#FF7F00"},
  {t:3,n:"Pisangkuda",img:"",c:"#FFEE33"},{t:4,n:"Duriankodok",img:"",c:"#88CC44"},
  {t:5,n:"Rambutanjing",img:"",c:"#CC2244"},{t:6,n:"Nanasbebek",img:"",c:"#FF9900"},
  {t:7,n:"Semangkamonyet",img:"",c:"#FF3366"},{t:8,n:"Jerukbuaya",img:"",c:"#FF5500"},
  {t:9,n:"Alpukatgajah",img:"",c:"#44AA44"},{t:10,n:"Salakharimau",img:"",c:"#8B6513"},
  {t:11,n:"DukuPanda",img:"",c:"#BBBBBB"},{t:12,n:"MarkisaGorila",img:"",c:"#9933CC"},
  {t:13,n:"BlimbingBadak",img:"",c:"#44AACC"},{t:14,n:"JambuDino",img:"",c:"#22BB55"},
  {t:15,n:"KedondongNaga",img:"",c:"#FF4400"},{t:16,n:"SukunAlien",img:"",c:"#00FFCC"},
  {t:17,n:"CempedakRobot",img:"",c:"#8888FF"},{t:18,n:"LangsatRaksasa",img:"",c:"#FFAA00"},
  {t:19,n:"KepelDewa",img:"",c:"#FFD700"},{t:20,n:"WuniPhoenix",img:"",c:"#FF6600"},
  {t:21,n:"MunduTitan",img:"",c:"#EE88FF"},{t:22,n:"GandariaCosmos",img:"",c:"#4488FF"},
  {t:23,n:"IBLIS BUAH",img:"",c:"#FF2222"},{t:24,n:"GLORBO SUPREME",img:"",c:"#FFFFFF"},
];
// URL game — GANTI DENGAN URL VERCEL KAMU
const GAME_URL = 'https://brainroot-three.vercel.app';
function assetUrl(t){ return t<=10?GAME_URL+'/assets/'+t+'.png':GAME_URL+'/assets/epic/'+(t-10)+'.png'; }

// ══════════════════════════════════════════════
//  RECEIVE MESSAGES FROM GAME IFRAME
// ══════════════════════════════════════════════
let gameData={score:0,best:0,merges:0,maxTier:1,totalGames:0};
let mergeLog=[];

window.addEventListener('message',e=>{
  const d=e.data;
  if(!d||!d.type)return;
  if(d.type==='MERGE'){
    gameData={...gameData,...d};
    updateHUD();
    addMergeLog(d.tier,d.score,d.combo||1);
    // update next preview from game iframe._gameData
    syncNextItems();
  }
  if(d.type==='GAMEOVER'){
    gameData={...gameData,...d};
    updateHUD();
  }
  if(d.type==='RESTART'){
    gameData={...gameData,...d,score:0,merges:0,maxTier:1};
    mergeLog=[]; document.getElementById('mlog').innerHTML='';
    updateHUD();
  }
});

function updateHUD(){
  document.getElementById('H-SC').textContent=gameData.score.toLocaleString();
  document.getElementById('H-BT').textContent=gameData.best>0?gameData.best.toLocaleString():'—';
  document.getElementById('H-MG').textContent=gameData.merges||0;
  document.getElementById('H-MT').textContent=gameData.maxTier>1?TD[gameData.maxTier-1].n.slice(0,10):'—';
  document.getElementById('G-GP').textContent=gameData.totalGames||0;
}

function syncNextItems(){
  try{
    const gd=document.getElementById('game-frame').contentWindow._gameData;
    if(!gd)return;
    const ni=TD[gd.nextT-1], ai=TD[gd.afterT-1];
    document.getElementById('H-NI').src=assetUrl(gd.nextT);
    document.getElementById('H-AI').src=assetUrl(gd.afterT);
    document.getElementById('S-NI').src=assetUrl(gd.nextT);
    document.getElementById('S-AI').src=assetUrl(gd.afterT);
    document.getElementById('S-NN').textContent=ni.n;
    document.getElementById('S-AN').textContent=ai.n;
    document.getElementById('G-IT').textContent=gd.items||0;
  }catch(e){}
}
setInterval(syncNextItems,800);

// ══════════════════════════════════════════════
//  MERGE LOG
// ══════════════════════════════════════════════
function addMergeLog(tier,score,combo){
  const d=TD[tier-1];
  const t=new Date();
  const ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0')+':'+t.getSeconds().toString().padStart(2,'0');
  mergeLog.push({tier,score,combo,ts,c:d.c,n:d.n});
  if(mergeLog.length>8)mergeLog.shift();
  document.getElementById('mlog').innerHTML=mergeLog.map(m=>
    `<div class="mle" style="color:${m.c}">
      <span style="font-size:7px;color:#333;">${m.ts}</span>
      <b> T${m.tier} ${m.n}</b>
      <span style="color:#FFD700;font-size:8px;float:right">+${(score>0?score:0).toLocaleString()}</span>
      ${m.combo>=2?`<span style="font-size:7px;color:#FFD700;display:block"> ×${m.combo} COMBO</span>`:''}
    </div>`
  ).join('');
}

// ══════════════════════════════════════════════
//  SESSION TIMER
// ══════════════════════════════════════════════
const start=Date.now();
setInterval(()=>{
  const s=Math.floor((Date.now()-start)/1000);
  document.getElementById('G-SS').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
},1000);

// ══════════════════════════════════════════════
//  TIER FOOTER LEGEND
// ══════════════════════════════════════════════
(function(){
  const el=document.getElementById('tscroll');
  for(let rep=0;rep<2;rep++){
    TD.forEach(d=>{
      const s=document.createElement('span');
      s.className='tp';s.style.color=d.c;s.style.borderColor=d.c+'44';s.style.background=d.c+'0E';
      s.textContent=d.t+'. '+d.n;el.appendChild(s);
    });
  }
})();
</script>
</body>
</html>
