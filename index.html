<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brainroot Merge Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#07071C;}
canvas{display:block;}
#abtn{
  position:fixed;bottom:12px;right:12px;
  background:rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.15);
  color:#555;font-size:10px;padding:5px 12px;border-radius:20px;
  cursor:pointer;z-index:999;transition:all .2s;font-family:monospace;
}
#abtn:hover{color:#FFD700;border-color:#FFD700;}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="abtn" onclick="unlockAudio()">🔇 AUDIO</div>
<script>
'use strict';
// ═══════════════════════════════════════════
//  CANVAS — fills entire viewport
// ═══════════════════════════════════════════
const cv = document.getElementById('gc');
const cx = cv.getContext('2d');
let GW, GH;

function resize() {
  GW = cv.width  = window.innerWidth;
  GH = cv.height = window.innerHeight;
  // update all item radii on resize
  items.forEach(it => { it.r = TR(it.tier); });
  invalidC();
}
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════
//  TIER DATA  (24 tiers)
// ═══════════════════════════════════════════
const TD = [
  {t:1,  n:"Lemonkucing",    img:"assets/1.png",        c:"#FFD700"},
  {t:2,  n:"Mangosapi",      img:"assets/2.png",        c:"#FF7F00"},
  {t:3,  n:"Pisangkuda",     img:"assets/3.png",        c:"#FFEE33"},
  {t:4,  n:"Duriankodok",    img:"assets/4.png",        c:"#88CC44"},
  {t:5,  n:"Rambutanjing",   img:"assets/5.png",        c:"#CC2244"},
  {t:6,  n:"Nanasbebek",     img:"assets/6.png",        c:"#FF9900"},
  {t:7,  n:"Semangkamonyet", img:"assets/7.png",        c:"#FF3366"},
  {t:8,  n:"Jerukbuaya",     img:"assets/8.png",        c:"#FF5500"},
  {t:9,  n:"Alpukatgajah",   img:"assets/9.png",        c:"#44AA44"},
  {t:10, n:"Salakharimau",   img:"assets/10.png",       c:"#8B6513"},
  {t:11, n:"DukuPanda",      img:"assets/epic/1.png",   c:"#BBBBBB"},
  {t:12, n:"MarkisaGorila",  img:"assets/epic/2.png",   c:"#9933CC"},
  {t:13, n:"BlimbingBadak",  img:"assets/epic/3.png",   c:"#44AACC"},
  {t:14, n:"JambuDino",      img:"assets/epic/4.png",   c:"#22BB55"},
  {t:15, n:"KedondongNaga",  img:"assets/epic/5.png",   c:"#FF4400"},
  {t:16, n:"SukunAlien",     img:"assets/epic/6.png",   c:"#00FFCC"},
  {t:17, n:"CempedakRobot",  img:"assets/epic/7.png",   c:"#8888FF"},
  {t:18, n:"LangsatRaksasa", img:"assets/epic/8.png",   c:"#FFAA00"},
  {t:19, n:"KepelDewa",      img:"assets/epic/9.png",   c:"#FFD700"},
  {t:20, n:"WuniPhoenix",    img:"assets/epic/10.png",  c:"#FF6600"},
  {t:21, n:"MunduTitan",     img:"assets/epic/11.png",  c:"#EE88FF"},
  {t:22, n:"GandariaCosmos", img:"assets/epic/12.png",  c:"#4488FF"},
  {t:23, n:"IBLIS BUAH",     img:"assets/epic/13.png",  c:"#FF2222"},
  {t:24, n:"GLORBO SUPREME", img:"assets/epic/14.png",  c:"#FFFFFF"},
];
const PTS=[10,30,60,100,160,250,400,600,900,1300,1800,2400,3200,4200,5500,7000,9000,11500,14500,18000,22000,27000,33000,50000];
const MAXT=24, SPAWNT=4, MAXITM=55;
// radius scales with viewport width
function TR(t){ return GW ? Math.max(10,Math.round((14+(t-1)*8)*GW/720)) : 14+(t-1)*8; }
TD.forEach((d,i)=>{ d.pts=PTS[i]; });
const IMGS={};
TD.forEach(d=>{ const img=new Image(); img.src=d.img; IMGS[d.t]=img; });

// ═══════════════════════════════════════════
//  PHYSICS CONSTANTS
// ═══════════════════════════════════════════
const GRAV=0.52, SUB=8, BNCE=0.045, FRIC=0.74;
let _C=null;
function getC(){
  if(_C)return _C;
  const W=Math.max(4,Math.round(GW*.008));
  _C={ WALL:W, FLOOR:GH-W, DANGER:Math.round(GH*.17), DROPY:Math.round(GH*.10) };
  return _C;
}
function invalidC(){ _C=null; }

// ═══════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════
let audioOn=false, sfxCtx=null;
const bgm=new Audio(); let bgmIdx=0; bgm.volume=.45;
bgm.addEventListener('ended',()=>{ bgmIdx=(bgmIdx+1)%5; bgm.src=`bgm/${bgmIdx+1}.mp3`; bgm.play().catch(()=>{}); });
function unlockAudio(){
  if(audioOn)return; audioOn=true;
  try{sfxCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  bgm.src='bgm/1.mp3'; bgm.play().catch(()=>{});
  const b=document.getElementById('abtn');
  if(b){b.textContent='🔊 ON';setTimeout(()=>b.style.opacity='0',2000);setTimeout(()=>b.style.display='none',2500);}
}
document.addEventListener('click',unlockAudio,{once:true});
function tone(f,d,tp,v,dl){
  if(!sfxCtx)return;
  try{
    if(sfxCtx.state==='suspended')sfxCtx.resume();
    const o=sfxCtx.createOscillator(),g=sfxCtx.createGain();
    o.connect(g);g.connect(sfxCtx.destination);
    o.type=tp||'sine';o.frequency.value=f;
    const t=sfxCtx.currentTime+(dl||0);
    g.gain.setValueAtTime(v||.3,t);
    g.gain.exponentialRampToValueAtTime(.0001,t+d);
    o.start(t);o.stop(t+d+.01);
  }catch(e){}
}
const NOTES=[262,294,330,349,392,440,494,523,587,659,698,784,880,988,1047,1175,1319,1397,1568,1760,1976,2093,2349,2637];
function sndMerge(t){
  const f=NOTES[Math.min(t-1,NOTES.length-1)];
  tone(f,.22,'sine',.35);
  if(t>=3)tone(f*1.5,.18,'triangle',.13,.02);
  if(t>=6)tone(f*2,.24,'sine',.10,.04);
  if(t>=9)tone(f*2.5,.28,'sawtooth',.08,.06);
  if(t>=12)for(let i=0;i<3;i++)tone(f*(1.5+i*.5),.38,'sawtooth',.05,i*.05);
  if(t>=17)for(let i=0;i<5;i++)tone(f*(1+i*.22),.5,'sine',.09,i*.04);
  if(t>=22)for(let i=0;i<7;i++)tone(f*(1+i*.18),.75,'sawtooth',.11,i*.038);
}
function sndDrop(){ tone(200,.06,'sine',.12);tone(130,.10,'sine',.08,.03); }
function sndGameOver(){ [523,415,349,262,196,131].forEach((f,i)=>tone(f,.4,'sawtooth',.3,i*.2)); }

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let items=[],mergeQ=[],parts=[],floats=[];
let nextT=rndT(),afterT=rndT(),eid=0;
let score=0,best=0,merges=0,maxTier=1,totalGames=0;
let gameOver=false,goTime=0;
let mFlash={txt:'',col:'#fff',tmr:0};
let combo=0,maxCombo=0,comboEndAt=0,dropReadyAt=0;
let goWarnFrames=0; const GO_WARN=55;
const sessStart=Date.now();

function rndT(){ return 1+Math.floor(Math.random()*SPAWNT); }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function ri(n){ return Math.floor(Math.random()*n); }
function mkItem(tier,x,y){ return{id:eid++,tier,x,y,vx:0,vy:0,r:TR(tier),flash:0,merging:false,sched:false,cool:true}; }
function setCool(it,ms){ it.cool=true; setTimeout(()=>{it.cool=false;},ms||400); }

// ═══════════════════════════════════════════
//  AI PLAYER
// ═══════════════════════════════════════════
const ai={x:0,tx:0,state:'wait',tmr:80,ph:0};
function aiTick(){
  const{WALL,DANGER,DROPY}=getC();
  const r=TR(nextT);
  ai.ph+=.033;
  const wb=Math.sin(ai.ph*1.3)*.8+Math.sin(ai.ph*.7)*.4;
  ai.x+=(ai.tx-ai.x)*.09+wb*.45+(Math.random()-.5)*.28;
  ai.x=clamp(ai.x,r+WALL+2,GW-WALL-r-2);
  ai.tmr--;
  switch(ai.state){
    case 'wait': if(ai.tmr<=0){ai.state='think';ai.tmr=18+ri(60);}break;
    case 'think':{
      if(ri(55)===0)ai.tx=clamp(GW*(.15+Math.random()*.7),r+WALL+4,GW-WALL-r-4);
      if(ai.tmr<=0){
        const tgts=items.filter(i=>!i.merging&&!i.cool&&i.tier===nextT&&i.y>DANGER+r*2.5);
        if(tgts.length>0&&Math.random()<.65){
          const pk=tgts[ri(tgts.length)];
          ai.tx=clamp(pk.x+(Math.random()-.5)*18,r+WALL+4,GW-WALL-r-4);
        }else{
          ai.tx=clamp(GW*(.12+Math.random()*.76),r+WALL+4,GW-WALL-r-4);
        }
        ai.state='aim';ai.tmr=14+ri(42);
      }
      break;
    }
    case 'aim':
      ai.x+=(Math.random()-.5)*1.3;
      if(ai.tmr<=0){
        if(Math.random()<.08)ai.tx=clamp(ai.tx+(Math.random()-.5)*80,r+WALL+4,GW-WALL-r-4);
        ai.state='drop';ai.tmr=5+ri(12);
      }
      break;
    case 'drop': if(ai.tmr<=0){doDrop();ai.state='wait';ai.tmr=50+ri(115);}break;
  }
}
function doDrop(){
  const{WALL,DROPY}=getC();
  if(Date.now()<dropReadyAt||gameOver||items.length>=MAXITM)return;
  const r=TR(nextT);
  const x=clamp(ai.x,r+WALL+1,GW-WALL-r-1);
  const it=mkItem(nextT,x,DROPY+r); it.vy=1.5;
  setCool(it,380); items.push(it);
  nextT=afterT; afterT=rndT();
  dropReadyAt=Date.now()+500;
  sndDrop(); hudUpdate();
}

// ═══════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════
function physics(){
  const{WALL,FLOOR,DROPY}=getC();
  const now=performance.now();
  const rdy=mergeQ.filter(m=>now-m.t>=100);
  mergeQ=mergeQ.filter(m=>now-m.t<100);
  rdy.forEach(m=>doMerge(m.a,m.b));
  const dt=1/SUB;
  for(let s=0;s<SUB;s++){
    for(const it of items){
      if(it.merging)continue;
      it.vy+=GRAV*dt; it.x+=it.vx*dt; it.y+=it.vy*dt;
    }
    for(const it of items){
      if(it.merging)continue;
      if(it.x-it.r<WALL){it.x=WALL+it.r;it.vx=Math.abs(it.vx)*BNCE;}
      if(it.x+it.r>GW-WALL){it.x=GW-WALL-it.r;it.vx=-Math.abs(it.vx)*BNCE;}
      if(it.y+it.r>FLOOR){it.y=FLOOR-it.r;it.vy=-Math.abs(it.vy)*BNCE;it.vx*=FRIC;}
      if(it.y-it.r<DROPY){it.y=DROPY+it.r;if(it.vy<0)it.vy=0;}
    }
    const n=items.length;
    for(let i=0;i<n;i++){
      const a=items[i];if(a.merging)continue;
      for(let j=i+1;j<n;j++){
        const b=items[j];if(b.merging)continue;
        const dx=b.x-a.x,dy=b.y-a.y,d2=dx*dx+dy*dy,md=a.r+b.r;
        if(d2>=md*md||d2<.0001)continue;
        const d=Math.sqrt(d2),nx=dx/d,ny=dy/d;
        if(a.tier===b.tier&&a.tier<MAXT&&!a.cool&&!b.cool&&!a.sched&&!b.sched){
          a.sched=true;b.sched=true;a.merging=true;b.merging=true;
          mergeQ.push({a,b,t:performance.now()}); continue;
        }
        const ov=(md-d)*.5;
        a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
        const rv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
        if(rv>=0)continue;
        const imp=-(1+BNCE)*rv*.5;
        a.vx-=imp*nx;a.vy-=imp*ny;b.vx+=imp*nx;b.vy+=imp*ny;
      }
    }
  }
  for(const it of items){
    if(it.merging)continue;
    const spd=Math.hypot(it.vx,it.vy);
    if(spd<.08){it.vx=0;it.vy=0;}
    else if(spd<2){it.vx*=.60;it.vy*=.60;}
    else if(spd<5){it.vx*=.97;it.vy*=.97;}
    else{it.vx*=.998;it.vy*=.998;}
    it.flash=Math.max(0,it.flash-1);
  }
}

function doMerge(a,b){
  items=items.filter(i=>i!==a&&i!==b);
  const nt=a.tier+1, mx=(a.x+b.x)*.5, my=(a.y+b.y)*.5;
  if(nt>MAXT){score+=PTS[MAXT-1];hudUpdate();return;}
  const ni=mkItem(nt,mx,my);
  ni.vx=(a.vx+b.vx)*.10; ni.vy=(a.vy+b.vy)*.10-.55;
  ni.flash=32; setCool(ni,540); items.push(ni);
  score+=PTS[nt-1]; merges++;
  if(nt>maxTier)maxTier=nt;
  const now=Date.now();
  if(now<comboEndAt)combo++;else combo=1;
  comboEndAt=now+2800;
  if(combo>maxCombo)maxCombo=combo;
  spawnParts(mx,my,TD[nt-1].c,12+nt);
  sndMerge(nt);
  const fsz=Math.max(11,Math.round((12+Math.min(nt,10))*GW/720));
  addFloat(mx,my-ni.r-8,'+'+PTS[nt-1].toLocaleString(),TD[nt-1].c,fsz);
  if(combo>=2)addFloat(mx,my-ni.r-28,'×'+combo+' COMBO!','#FFD700',Math.max(10,Math.round(11*GW/720)));
  mFlash.txt=TD[nt-1].n+(nt>=9?' !!!':'!');
  mFlash.col=TD[nt-1].c; mFlash.tmr=72;
  // broadcast score to stream-layout via postMessage
  try{ window.parent.postMessage({type:'MERGE',tier:nt,score,merges,maxTier,combo},'*'); }catch(e){}
  hudUpdate();
}

// ═══════════════════════════════════════════
//  GAME OVER
// ═══════════════════════════════════════════
function checkGO(){
  if(gameOver||items.length<2){goWarnFrames=0;setGoBar(0);return;}
  const{DANGER}=getC();
  let danger=false;
  for(const it of items){
    if(it.merging||it.cool)continue;
    if(Math.hypot(it.vx,it.vy)<.5&&it.y-it.r<DANGER){danger=true;break;}
  }
  if(danger){
    goWarnFrames++; setGoBar(goWarnFrames/GO_WARN);
    if(goWarnFrames>=GO_WARN)triggerGO();
  }else{
    goWarnFrames=Math.max(0,goWarnFrames-4); setGoBar(goWarnFrames/GO_WARN);
  }
}
function setGoBar(r){
  // change body border to signal danger
  document.body.style.outline=r>.1?`${Math.round(r*4)}px solid rgba(255,20,20,${.4+r*.5})`:'none';
}
function triggerGO(){
  gameOver=true;goTime=performance.now();
  if(score>best)best=score;
  goWarnFrames=0;setGoBar(0);sndGameOver();
  try{window.parent.postMessage({type:'GAMEOVER',score,best,merges},'*');}catch(e){}
  hudUpdate();
}
function restart(){
  items=[];mergeQ=[];parts=[];floats=[];
  score=0;merges=0;maxTier=1;combo=0;maxCombo=0;
  comboEndAt=0;dropReadyAt=0;mFlash.tmr=0;
  nextT=rndT();afterT=rndT();
  gameOver=false;goTime=0;goWarnFrames=0;totalGames++;
  setGoBar(0);document.body.style.outline='none';
  ai.state='wait';ai.tmr=80;ai.x=GW/2;ai.tx=GW/2;
  try{window.parent.postMessage({type:'RESTART',totalGames},'*');}catch(e){}
  hudUpdate();
}

// ═══════════════════════════════════════════
//  PARTICLES + FLOATS
// ═══════════════════════════════════════════
function spawnParts(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,spd=1.5+Math.random()*6;
    parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1.2,r:1.5+Math.random()*4,life:1,dec:.02+Math.random()*.015,col});
  }
}
function tickParts(){ parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.93;p.vy=p.vy*.93+.08;p.life-=p.dec;return p.life>0&&p.y<GH+30;}); }
function addFloat(x,y,txt,col,sz){floats.push({x,y,txt,col,sz:sz||14,life:1.3,vy:-.88});}
function tickFloats(){floats=floats.filter(f=>{f.y+=f.vy;f.life-=.016;return f.life>0;});}

// ═══════════════════════════════════════════
//  HUD CANVAS OVERLAY
// ═══════════════════════════════════════════
function hudUpdate(){
  // expose data so stream-layout can read it
  window._gameData={score,best,merges,maxTier,combo,maxCombo,totalGames,items:items.length,nextT,afterT};
}
setInterval(()=>{
  const s=Math.floor((Date.now()-sessStart)/1000);
  if(window._gameData)window._gameData.session=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  window._gameData={...(window._gameData||{}),items:items.length};
},1000);

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render(){
  if(!GW||!GH)return;
  const{WALL,FLOOR,DANGER,DROPY}=getC();
  const now=Date.now();

  cx.fillStyle='#07071C';cx.fillRect(0,0,GW,GH);
  // Grid
  cx.fillStyle='rgba(255,255,255,.016)';
  for(let x=28;x<GW;x+=28)for(let y=28;y<GH;y+=28)cx.fillRect(x,y,1,1);
  // Scanlines
  cx.fillStyle='rgba(0,0,20,.025)';
  for(let y=0;y<GH;y+=3)cx.fillRect(0,y,GW,1);
  // Walls
  cx.fillStyle='#0C0C30';
  cx.fillRect(0,0,WALL,GH);cx.fillRect(GW-WALL,0,WALL,GH);cx.fillRect(0,GH-WALL,GW,WALL);
  cx.strokeStyle='#1A1A55';cx.lineWidth=1;cx.strokeRect(.5,.5,GW-1,GH-1);

  // Danger zone
  if(!gameOver){
    const pulse=.2+Math.sin(now*.005)*.08;
    const wR=goWarnFrames/GO_WARN;
    cx.fillStyle=`rgba(255,20,20,${.04+wR*.1})`;
    cx.fillRect(WALL,0,GW-WALL*2,DANGER);
    cx.strokeStyle=`rgba(255,${Math.round(65-wR*45)},${Math.round(65-wR*55)},${pulse+wR*.4})`;
    cx.setLineDash([8,6]);cx.lineWidth=1.5+wR*1.5;
    cx.beginPath();cx.moveTo(WALL,DANGER);cx.lineTo(GW-WALL,DANGER);cx.stroke();
    cx.setLineDash([]);
    cx.font='bold 9px monospace';cx.textAlign='right';cx.textBaseline='alphabetic';
    cx.fillStyle=`rgba(255,80,80,${pulse+wR*.3+.1})`;
    cx.fillText('☠ DANGER',GW-WALL-4,DANGER-4);
  }

  // Items
  for(const it of items)drawItem(it,it.merging?.28:1);

  // Particles
  cx.save();
  for(const p of parts){
    cx.globalAlpha=p.life;
    cx.beginPath();cx.arc(p.x,p.y,Math.max(.5,p.r*p.life),0,Math.PI*2);
    cx.fillStyle=p.col;cx.fill();
  }
  cx.restore();

  // Float texts
  cx.save();cx.textAlign='center';
  for(const f of floats){
    const a=Math.min(1,f.life);if(a<=0)continue;
    cx.globalAlpha=a;
    cx.font='bold '+f.sz+'px monospace';cx.textBaseline='middle';
    cx.lineWidth=3;cx.strokeStyle='rgba(0,0,0,.93)';cx.strokeText(f.txt,f.x,f.y);
    cx.fillStyle=f.col;cx.fillText(f.txt,f.x,f.y);
  }
  cx.restore();

  // Merge flash
  if(mFlash.tmr>0&&!gameOver){
    mFlash.tmr--;
    const fr=72-mFlash.tmr;
    let a=fr<10?fr/10:fr<52?1:1-(fr-52)/20;
    a=Math.max(0,a)*.84;
    cx.save();cx.globalAlpha=a;
    const fsz=Math.max(14,Math.round(18*GW/720));
    cx.font='bold '+fsz+'px monospace';cx.textAlign='center';cx.textBaseline='middle';
    cx.lineWidth=5;cx.strokeStyle='rgba(0,0,0,.97)';cx.strokeText(mFlash.txt,GW/2,GH*.48);
    cx.fillStyle=mFlash.col;cx.fillText(mFlash.txt,GW/2,GH*.48);
    cx.restore();
  }

  // AI guide + preview
  if(!gameOver){
    const{WALL:W,DROPY:DY}=getC();
    const ax=clamp(ai.x,W+4,GW-W-4);
    const nr=TR(nextT);
    cx.strokeStyle='rgba(255,255,255,.05)';cx.setLineDash([4,7]);cx.lineWidth=1;
    cx.beginPath();cx.moveTo(ax,W+1);cx.lineTo(ax,DY-4);cx.stroke();cx.setLineDash([]);
    cx.fillStyle='rgba(255,255,255,.34)';cx.beginPath();
    cx.moveTo(ax,DY);cx.lineTo(ax-5,DY-11);cx.lineTo(ax+5,DY-11);cx.fill();
    drawAt(nextT,ax,DY+nr,.6);
  }

  // HUD text on canvas (score/merge/tier inline)
  if(!gameOver){
    const fsz=Math.max(10,Math.round(12*GW/720));
    cx.font='bold '+fsz+'px monospace';cx.textAlign='left';cx.textBaseline='top';
    cx.fillStyle='rgba(0,0,0,.7)';cx.fillRect(WALL+1,WALL+1,Math.round(GW*.42),fsz+4);
    cx.fillStyle='#FFD700';
    cx.fillText('SCORE '+score.toLocaleString()+'  MERGE '+merges+'  BEST '+best.toLocaleString(), WALL+4, WALL+3);
    // Next item label
    cx.textAlign='right';
    cx.fillStyle='rgba(0,0,0,.6)';cx.fillRect(GW-WALL-Math.round(GW*.28),WALL+1,Math.round(GW*.28),fsz+4);
    cx.fillStyle='#aaa';
    cx.fillText('NEXT: '+TD[nextT-1].n, GW-WALL-3, WALL+3);
  }

  // Game over
  if(gameOver){
    const elapsed=(performance.now()-goTime)/1000;
    const secs=Math.max(0,Math.ceil(5-elapsed));
    cx.fillStyle='rgba(4,4,18,.88)';cx.fillRect(0,0,GW,GH);
    cx.textAlign='center';cx.textBaseline='middle';
    const f1=Math.round(38*GW/720),f2=Math.round(19*GW/720),f3=Math.round(13*GW/720);
    cx.font='bold '+f1+'px monospace';cx.fillStyle='#FF3366';cx.fillText('💀 GAME OVER',GW/2,GH*.33);
    cx.font='bold '+f2+'px monospace';cx.fillStyle='#FFD700';cx.fillText('SCORE: '+score.toLocaleString(),GW/2,GH*.33+f1*1.5);
    if(score>0&&score>=best){cx.font='bold '+f3+'px monospace';cx.fillStyle='#FFD700';cx.fillText('🏆 NEW BEST!',GW/2,GH*.33+f1*1.5+f2*1.6);}
    cx.font=f3+'px monospace';cx.fillStyle='#444';cx.fillText('Restart dalam '+secs+'...',GW/2,GH*.33+f1*1.5+f2*3.2);
  }
}

function drawItem(it,alpha){
  const img=IMGS[it.tier],r=it.r,sz=r*2.22;
  cx.save();cx.globalAlpha=(alpha==null)?1:alpha;
  if(img&&img.complete&&img.naturalWidth>0){
    cx.drawImage(img,it.x-sz/2,it.y-sz/2,sz,sz);
  }else{
    const d=TD[it.tier-1];
    const g=cx.createRadialGradient(it.x-r*.2,it.y-r*.2,r*.06,it.x,it.y,r);
    g.addColorStop(0,d.c+'80');g.addColorStop(1,d.c+'18');
    cx.beginPath();cx.arc(it.x,it.y,r,0,Math.PI*2);cx.fillStyle=g;cx.fill();
    cx.strokeStyle=d.c;cx.lineWidth=2;cx.stroke();
    cx.font='bold '+Math.max(8,Math.round(r*.2))+'px monospace';
    cx.fillStyle='#fff';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(d.n.slice(0,7),it.x,it.y-r*.1);
    cx.font=Math.max(7,Math.round(r*.14))+'px monospace';
    cx.fillStyle=d.c;cx.fillText('T'+it.tier,it.x,it.y+r*.55);
  }
  if(it.flash>0){
    const f=it.flash/32;
    cx.beginPath();cx.arc(it.x,it.y,r*(1+f*.28),0,Math.PI*2);
    cx.strokeStyle=`rgba(255,255,255,${f*.86})`;cx.lineWidth=r*.2;cx.stroke();
  }
  cx.restore();
}
function drawAt(tier,x,y,a){
  const r=TR(tier),img=IMGS[tier],sz=r*2.22;
  cx.save();cx.globalAlpha=a||1;
  if(img&&img.complete&&img.naturalWidth>0){cx.drawImage(img,x-sz/2,y-sz/2,sz,sz);}
  else{const d=TD[tier-1];cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fillStyle=d.c+'38';cx.fill();cx.strokeStyle=d.c;cx.lineWidth=2;cx.stroke();}
  cx.restore();
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
resize();
ai.x=GW/2;ai.tx=GW/2;
hudUpdate();

function loop(){
  if(!gameOver){
    invalidC();physics();aiTick();checkGO();tickParts();tickFloats();
  }else{
    if(performance.now()-goTime>5000)restart();
  }
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
