// ════════════════════════════════════════════════════
//  POLYGON SHAPE EXTRACTION
//  Extract convex hull from PNG alpha channel per tier.
//  Requires CORS header (set in vercel.json).
// ════════════════════════════════════════════════════
const IMGS = {};
const POLY = {};

// FIX: DEF_POLY as a factory — each call returns a NEW array (no shared reference)
function makeDEF_POLY() {
  const pts = [], N = 12;
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2;
    pts.push({ x: Math.cos(a) * 0.90, y: Math.sin(a) * 0.90 });
  }
  return pts;
}

function extractConvexHull(img, tier) {
  try {
    const SZ = 64; // higher res for better shape accuracy
    const oc = document.createElement('canvas');
    oc.width = oc.height = SZ;
    const ox = oc.getContext('2d', { willReadFrequently: true });
    ox.drawImage(img, 0, 0, SZ, SZ);
    const pd = ox.getImageData(0, 0, SZ, SZ).data;
    const half = SZ / 2;
    const DIRS = 24; // more rays = smoother hull
    const raw = [];

    for (let d = 0; d < DIRS; d++) {
      const angle = (d / DIRS) * Math.PI * 2;
      const dx = Math.cos(angle), dy = Math.sin(angle);
      let farthest = 4;
      for (let t = 4; t <= half - 1; t++) {
        const px = Math.min(SZ-1, Math.max(0, Math.round(half + dx * t)));
        const py = Math.min(SZ-1, Math.max(0, Math.round(half + dy * t)));
        if (pd[(py * SZ + px) * 4 + 3] > 40) farthest = t;
      }
      // Normalise to -1..1, shrink by 5% for physics/visual margin
      raw.push({ x: (dx * farthest) / half * 0.95, y: (dy * farthest) / half * 0.95 });
    }
    POLY[tier] = raw; // unique array per tier — no shared ref
  } catch(e) {
    // getImageData blocked (CORS) or other error → use default
    POLY[tier] = makeDEF_POLY();
  }
}

TD.forEach(d => {
  IMGS[d.t] = null;
  POLY[d.t] = makeDEF_POLY(); // FIX: each tier gets its OWN copy
  const img = new Image();
  img.crossOrigin = 'anonymous'; // needs CORS header on char/ in vercel.json
  img.onload  = () => { IMGS[d.t] = img; extractConvexHull(img, d.t); };
  img.onerror = () => { IMGS[d.t] = null; }; // POLY already has default
  img.src = d.img;
});

// World-space vertices of an item's polygon
function getVerts(it) {
  const poly = POLY[it.tier];
  return poly.map(p => ({ x: it.x + p.x * it.r, y: it.y + p.y * it.r }));
}

// ════════════════════════════════════════════════════
//  SAT — Separating Axis Theorem
//  FIX: removed dead variables 'n', 'cx', 'cy'
//  Returns {ov, nx, ny} overlap+normal, or null if separated.
// ════════════════════════════════════════════════════
function satTest(vertsA, vertsB) {
  let minOv = Infinity, rnx = 0, rny = 0;

  for (let pass = 0; pass < 2; pass++) {
    const poly = pass === 0 ? vertsA : vertsB;
    const len  = poly.length;
    for (let i = 0; i < len; i++) {
      const j = (i + 1) % len;
      // Edge outward normal
      let ax = -(poly[j].y - poly[i].y);
      let ay =   poly[j].x - poly[i].x;
      const mag = Math.sqrt(ax*ax + ay*ay);
      if (mag < 1e-8) continue;
      ax /= mag; ay /= mag;

      // Project both polygons onto axis
      let minA = Infinity, maxA = -Infinity;
      let minB = Infinity, maxB = -Infinity;
      for (const v of vertsA) { const p = v.x*ax + v.y*ay; if(p<minA)minA=p; if(p>maxA)maxA=p; }
      for (const v of vertsB) { const p = v.x*ax + v.y*ay; if(p<minB)minB=p; if(p>maxB)maxB=p; }

      const ov = Math.min(maxA - minB, maxB - minA);
      if (ov <= 0) return null;            // separating axis found
      if (ov < minOv) { minOv = ov; rnx = ax; rny = ay; }
    }
  }

  // Ensure normal points from centroid A → centroid B
  // FIX: compute centroids properly, no dead cx/cy variables
  let cAx = 0, cAy = 0, cBx = 0, cBy = 0;
  for (const v of vertsA) { cAx += v.x; cAy += v.y; }
  cAx /= vertsA.length; cAy /= vertsA.length;
  for (const v of vertsB) { cBx += v.x; cBy += v.y; }
  cBx /= vertsB.length; cBy /= vertsB.length;
  if ((cBx - cAx) * rnx + (cBy - cAy) * rny < 0) { rnx = -rnx; rny = -rny; }

  return { ov: minOv, nx: rnx, ny: rny };
}

// Radius: T1–T10 all same size as T10, T11–T30 grow
function TR(t) {
  const base = GW ? Math.max(28, Math.round(67 * GW / 720)) : 67;
  if (t <= 10) return base;
  return Math.round(base + (t - 10) * Math.max(4, Math.round(5 * GW / 720)));
}

// ════════════════════════════════════════════════════
//  PROGRESSIVE TIER UNLOCK
// ════════════════════════════════════════════════════
let unlockedDropTier = 1;
const MAX_DROP_TIER  = 8;

function rndDropTier() {
  const pool = Math.min(unlockedDropTier, MAX_DROP_TIER);
  const w = []; for (let t = 1; t <= pool; t++) w.push(Math.max(1, pool - t + 2));
  const tot = w.reduce((a,b)=>a+b, 0); let r = Math.random() * tot;
  for (let t = 1; t <= pool; t++) { r -= w[t-1]; if (r <= 0) return t; }
  return 1;
}
function onMergeUnlock(nt) {
  if (nt > unlockedDropTier && nt <= MAX_DROP_TIER + 1)
    unlockedDropTier = Math.min(nt, MAX_DROP_TIER);
}

// ════════════════════════════════════════════════════
//  PHYSICS CONSTANTS

const GRAV = 0.52, SUB = 6, BNCE = 0.038, FRIC = 0.72;

function getC() {
  if (_C) return _C;
  const W = Math.max(4, Math.round(GW * 0.009));
  _C = { WALL:W, FLOOR:GH-W, DANGER:Math.round(GH*0.16), DROPY:Math.round(GH*0.09) };
  return _C;
}

// ════════════════════════════════════════════════════
//  SHAKE SYSTEM
// ════════════════════════════════════════════════════
const shake = {
  power    : 0,
  ox       : 0,
  oy       : 0,
  // FIX: nextAt initialised PROPERLY inside init block, not 0
  nextAt   : 0,
  label    : '',
  labelT   : 0,
  // FIX: separate time-gate for random organic shakes
  rndNextAt: 0,
};

function doShake(power, label) {
  if (items.length < 3 || gameOver) return;
  shake.power  = Math.min(power || 8, 18);
  shake.label  = label || 'GOCOK!!!';
  shake.labelT = 90;

  const strength = power * 2.2;
  const { FLOOR, DROPY } = getC();
  for (const it of items) {
    if (it.merging) continue;
    // FIX: removed unused 'settled' variable
    const depth = Math.max(0, Math.min(1, (it.y - DROPY) / Math.max(1, FLOOR - DROPY)));
    it.vx += (Math.random() - 0.5) * strength * (0.6 + depth * 0.8);
    it.vy += -(Math.random() * strength * 0.5 + depth * strength * 0.3);
    if (depth > 0.7) it.vy -= Math.random() * strength * 0.6;
  }
  sndShake();
  try { window.parent.postMessage({type:'SHAKE', power}, '*'); } catch(e) {}
}

// FIX: shakeScheduler — random organic shakes are now TIME-GATED
// (not per-frame random which caused ~1 shake/sec at 60fps)
function shakeScheduler() {
  const now = Date.now();
  if (gameOver) return;

  const { FLOOR, DROPY } = getC();
  const settled    = items.filter(it => !it.merging && Math.hypot(it.vx,it.vy) < 0.4);
  const fillRatio  = settled.length / MAXITM;
  const topY       = items.length > 0 ? items.reduce((m,it) => it.y < m ? it.y : m, FLOOR) : FLOOR;
  const heightRatio = (FLOOR - topY) / Math.max(1, FLOOR - DROPY);

  // Danger shake: board is filling up — bypasses long cooldown
  if (now >= shake.nextAt) {
    if (fillRatio > 0.65 || heightRatio > 0.75) {
      const power = 7 + Math.round(fillRatio * 5);
      const label = fillRatio > 0.80 ? 'BAHAYA!! GOCOK!!!' : 'GOCOK DULU!!';
      doShake(power, label);
      shake.nextAt = now + 22000 + ri(18000); // 22–40s cooldown
      return;
    }
  }

  // FIX: organic random shake — separate time gate (every 8-18 seconds check)
  if (now >= shake.rndNextAt) {
    shake.rndNextAt = now + 8000 + ri(10000); // check every 8–18s
    if (Math.random() < 0.35) { // 35% chance when check fires → ~1 in 3 checks
      const power = 4 + ri(5);
      const label = ['GOCOK!','SHAKE IT!','CHAOS MODE!','BRAINROOT!!!','KOCOK LAGI!!!'][ri(5)];
      doShake(power, label);
      shake.nextAt = now + 30000 + ri(25000); // 30–55s before next danger-shake
    }
  }
}

let sfxCtx = null, bgmReady = false, bgmIdx = 0;

function ensureCtx() {
  if (!sfxCtx) try { sfxCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e) {}
  if (sfxCtx && sfxCtx.state !== 'running') sfxCtx.resume().catch(()=>{});
}
function ensureBGM() {
  if (bgmReady && !bgm.paused) return;
  if (!bgm.src || bgm.src === window.location.href) bgm.src = 'bgm/1.mp3';
  bgm.play().then(()=>{ bgmReady=true; }).catch(()=>{});
}
function ensureAudio() { ensureCtx(); ensureBGM(); }

window.addEventListener('load',      ensureAudio);

document.addEventListener('keydown',    ensureAudio);

const _aRetry = setInterval(()=>{
  if (bgmReady && sfxCtx && sfxCtx.state==='running') { clearInterval(_aRetry); return; }
  ensureAudio();
}, 1000);
setTimeout(ensureAudio, 50); setTimeout(ensureAudio, 350); setTimeout(ensureAudio, 900);

const NOTES = [262,294,330,349,392,440,494,523,587,659,698,784,880,988,
               1047,1175,1319,1397,1568,1760,1976,2093,2349,2637,
               2794,3136,3520,3951,4186,4699];

function tone(f, dur, tp, vol, dl) {
  if (!sfxCtx) return;
  if (sfxCtx.state === 'suspended') sfxCtx.resume().catch(()=>{});
  if (sfxCtx.state === 'closed') return;
  try {
    const o = sfxCtx.createOscillator(), g = sfxCtx.createGain();
    o.connect(g); g.connect(sfxCtx.destination);
    o.type = tp || 'sine'; o.frequency.value = f;
    const t = sfxCtx.currentTime + (dl||0) + (sfxCtx.state!=='running' ? 0.05 : 0);
    g.gain.setValueAtTime(vol||.28, t);
    g.gain.exponentialRampToValueAtTime(.0001, t+dur);
    o.start(t); o.stop(t+dur+.01);
  } catch(e) {}
}
function sndMerge(t) {
  const f = NOTES[Math.min(t-1, NOTES.length-1)];
  tone(f,.20,'sine',.32);
  if(t>=3)  tone(f*1.5,.16,'triangle',.12,.02);
  if(t>=6)  tone(f*2,.22,'sine',.09,.04);
  if(t>=10) tone(f*2.5,.26,'sawtooth',.07,.06);
  if(t>=15) for(let i=0;i<3;i++) tone(f*(1.5+i*.5),.35,'sawtooth',.05,i*.05);
  if(t>=20) for(let i=0;i<5;i++) tone(f*(1+i*.2),.48,'sine',.08,i*.04);
  if(t>=25) for(let i=0;i<7;i++) tone(f*(1+i*.16),.70,'sawtooth',.10,i*.038);
}
function sndDrop()     { tone(210,.05,'sine',.10); tone(140,.09,'sine',.06,.03); }
function sndGameOver() { [523,415,349,262,196,131].forEach((f,i)=>tone(f,.38,'sawtooth',.28,i*.2)); }
function sndUnlock()   { [523,659,784,1047].forEach((f,i)=>tone(f,.13,'triangle',.18,i*.09)); }
function sndShake()    { [120,90,70,55].forEach((f,i)=>tone(f,.18,'sawtooth',.22,i*.06)); tone(200,.08,'square',.12,.02); }

let items=[],mergeQ=[],parts=[],floats=[];
let nextT=1,afterT=1,eid=0;
let score=0,best=0,merges=0,maxTier=1,totalGames=0;
let gameOver=false,goTime=0;
let mFlash={txt:'',col:'#fff',tmr:0};
let combo=0,maxCombo=0,comboEndAt=0,dropReadyAt=0;
let goDangerSince=0;
const GO_WARN_MS=1000, MAXITM=55;
const sessStart=Date.now();

function clamp(v,lo,hi) { return Math.max(lo,Math.min(hi,v)); }
function ri(n)           { return Math.floor(Math.random()*n); }
function mkItem(tier,x,y){ return{id:eid++,tier,x,y,vx:0,vy:0,r:TR(tier),flash:0,merging:false,sched:false,cool:true}; }
function setCool(it,ms)  { it.cool=true; setTimeout(()=>{it.cool=false;},ms||400); }
function resetDropQueue() { nextT=rndDropTier(); afterT=rndDropTier(); }

// ════════════════════════════════════════════════════
//  SMART AI
// ════════════════════════════════════════════════════
const ai = {x:0,tx:0,state:'wait',tmr:60,ph:0,targetId:-1};

function scoreTarget(it) {
  const {DANGER}=getC();
  if (it.merging||it.cool||it.tier!==nextT) return -999;
  const spd=Math.hypot(it.vx,it.vy); if(spd>5)return -999;
  return (it.y/GH)*40 + Math.max(0,10-spd*2) + (it.y-it.r>DANGER?15:-30);
}
function findBestTarget() {
  let best=null,bs=8;
  for(const it of items){ const s=scoreTarget(it); if(s>bs){bs=s;best=it;} }
  return best;
}
function findBestPair() {
  const {DANGER}=getC();
  const m=items.filter(it=>!it.merging&&!it.cool&&it.tier===nextT&&Math.hypot(it.vx,it.vy)<4&&it.y-it.r>DANGER);
  if(m.length<2)return null;
  let bp=null,bd=Infinity;
  for(let i=0;i<m.length;i++) for(let j=i+1;j<m.length;j++){
    const d=Math.abs(m[i].x-m[j].x); if(d<bd){bd=d;bp=[m[i],m[j]];}
  }
  return bp;
}

function aiTick() {
  if(!GW)return;
  const{WALL,DANGER}=getC(); const r=TR(nextT);
  ai.ph+=.033;
  const wb=Math.sin(ai.ph*1.3)*.55+Math.sin(ai.ph*.7)*.3;
  ai.x+=(ai.tx-ai.x)*.11+wb*.35+(Math.random()-.5)*.18;
  ai.x=clamp(ai.x,r+WALL+2,GW-WALL-r-2);
  ai.tmr--;

  switch(ai.state){
    case'wait':
      if(ai.tmr<=0){ai.state='analyze';ai.tmr=6+ri(18);}
      break;
    case'analyze':{
      const pair=findBestPair(),tgt=findBestTarget();
      if(pair){
        ai.tx=clamp((pair[0].x+pair[1].x)*.5+(Math.random()-.5)*6,r+WALL+4,GW-WALL-r-4);
        ai.state='aim_precise';ai.tmr=8+ri(20);
      }else if(tgt){
        ai.tx=clamp(tgt.x+(Math.random()-.5)*10,r+WALL+4,GW-WALL-r-4);
        ai.state='aim_precise';ai.tmr=10+ri(24);ai.targetId=tgt.id;
      }else{
        const near=items.filter(it=>!it.merging&&it.y>DANGER&&it.tier<=nextT+2);
        if(near.length>2&&Math.random()<.6){
          ai.tx=clamp(near[ri(near.length)].x+(Math.random()-.5)*35,r+WALL+4,GW-WALL-r-4);
        }else{
          ai.tx=clamp(GW*(.15+Math.random()*.7),r+WALL+4,GW-WALL-r-4);
        }
        ai.state='aim_loose';ai.tmr=16+ri(36);
      }
      break;
    }
    case'aim_precise':
      if(ai.targetId>=0){
        const tgt=items.find(it=>it.id===ai.targetId);
        if(tgt&&!tgt.merging&&!tgt.cool&&Math.hypot(tgt.vx,tgt.vy)<3){
          ai.tx+=(tgt.x-ai.tx)*.07;
          ai.tx=clamp(ai.tx,r+WALL+4,GW-WALL-r-4);
        }
      }
      ai.x+=(Math.random()-.5)*.7;
      if(ai.tmr<=0){ai.state='drop';ai.tmr=3+ri(6);}
      break;
    case'aim_loose':
      ai.x+=(Math.random()-.5)*1.1;
      if(ai.tmr<=0){ai.state='drop';ai.tmr=3+ri(8);}
      break;
    case'drop':
      if(ai.tmr<=0){doDrop();ai.state='wait';ai.tmr=findBestPair()?28+ri(45):50+ri(90);ai.targetId=-1;}
      break;
  }
}

function doDrop() {
  const{WALL,DROPY}=getC();
  if(Date.now()<dropReadyAt||gameOver||items.length>=MAXITM)return;
  const r=TR(nextT),x=clamp(ai.x,r+WALL+1,GW-WALL-r-1);
  const it=mkItem(nextT,x,DROPY+r);
  it.vy=1.4; setCool(it,340); items.push(it);
  nextT=afterT; afterT=rndDropTier();
  dropReadyAt=Date.now()+480;
  sndDrop(); hudPost();
}

// ════════════════════════════════════════════════════
//  PHYSICS — SAT polygon collision
//  FIX: cache per-sub-step vertex arrays to avoid 15k allocs/frame
// ════════════════════════════════════════════════════
function physics() {
  const{WALL,FLOOR,DROPY}=getC();
  const now=performance.now();
  const rdy=mergeQ.filter(m=>now-m.t>=85);
  mergeQ=mergeQ.filter(m=>now-m.t<85);
  rdy.forEach(m=>doMerge(m.a,m.b));

  const dt=1/SUB;
  for(let s=0;s<SUB;s++){
    // Integrate
    for(const it of items){
      if(it.merging)continue;
      it.vy+=GRAV*dt; it.x+=it.vx*dt; it.y+=it.vy*dt;
    }
    // Wall + floor constraints
    for(const it of items){
      if(it.merging)continue;
      const r=it.r;
      if(it.x-r<WALL)      {it.x=WALL+r;     it.vx= Math.abs(it.vx)*BNCE;}
      if(it.x+r>GW-WALL)   {it.x=GW-WALL-r;  it.vx=-Math.abs(it.vx)*BNCE;}
      if(it.y+r>FLOOR)     {it.y=FLOOR-r;    it.vy=-Math.abs(it.vy)*BNCE; it.vx*=FRIC;}
      if(it.y-r<DROPY)     {it.y=DROPY+r;    if(it.vy<0)it.vy=0;}
    }

    // FIX: build vertex cache ONCE per sub-step (not per pair)
    const vertCache = new Map();
    function getVertsC(it) {
      if (vertCache.has(it.id)) return vertCache.get(it.id);
      const v = getVerts(it);
      vertCache.set(it.id, v);
      return v;
    }

    // SAT collision loop
    const n=items.length;
    for(let i=0;i<n;i++){
      const a=items[i]; if(a.merging)continue;
      for(let j=i+1;j<n;j++){
        const b=items[j]; if(b.merging)continue;

        // Broad phase: AABB circle check
        const dx=b.x-a.x, dy=b.y-a.y;
        const d2=dx*dx+dy*dy;
        const md=a.r+b.r;
        if(d2>md*md*1.04)continue;

        // FIX: merge trigger uses polygon overlap via SAT, not just circle
        // If same tier and polygons actually overlap → merge
        if(a.tier===b.tier&&a.tier<MAXT&&!a.cool&&!b.cool&&!a.sched&&!b.sched){
          // Use circle distance as merge trigger (reliable, cheap)
          // but polygon SAT guards against false positives at corners
          if(d2<md*md*0.85){ // circles significantly overlapping → merge
            a.sched=true;b.sched=true;a.merging=true;b.merging=true;
            mergeQ.push({a,b,t:performance.now()});
            continue;
          }
        }

        // SAT narrow phase
        const va=getVertsC(a), vb=getVertsC(b);
        const result=satTest(va,vb);
        if(!result)continue;

        const{ov,nx,ny}=result;
        const half=ov*0.5;

        // Position correction
        a.x-=nx*half; a.y-=ny*half;
        b.x+=nx*half; b.y+=ny*half;

        // Velocity impulse
        const rv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
        if(rv>=0)continue;
        const imp=-(1+BNCE)*rv*0.5;
        a.vx-=imp*nx; a.vy-=imp*ny;
        b.vx+=imp*nx; b.vy+=imp*ny;

        // Tangential friction
        const tx=-ny,ty=nx;
        const vt=(b.vx-a.vx)*tx+(b.vy-a.vy)*ty;
        const ft=vt*0.10;
        a.vx+=ft*tx; a.vy+=ft*ty;
        b.vx-=ft*tx; b.vy-=ft*ty;
      }
    }
  } // end sub-steps

  // Per-frame damping
  for(const it of items){
    if(it.merging)continue;
    const spd=Math.hypot(it.vx,it.vy);
    if     (spd<.07){it.vx=0;it.vy=0;}
    else if(spd<1.8){it.vx*=.58;it.vy*=.58;}
    else if(spd<5)  {it.vx*=.97;it.vy*=.97;}
    else            {it.vx*=.999;it.vy*=.999;}
    it.flash=Math.max(0,it.flash-1);
  }

  // Shake decay
  if(shake.power>0){
    shake.ox=(Math.random()-.5)*shake.power;
    shake.oy=(Math.random()-.5)*shake.power;
    shake.power=Math.max(0,shake.power-.35);
  }else{
    shake.ox=0; shake.oy=0;
  }
}

// ════════════════════════════════════════════════════
//  MERGE
// ════════════════════════════════════════════════════
function doMerge(a,b){
  items=items.filter(i=>i!==a&&i!==b);
  const nt=a.tier+1, mx=(a.x+b.x)*0.5, my=(a.y+b.y)*0.5;
  if(nt>MAXT){score+=PTS[MAXT-1];hudPost();return;}
  const ni=mkItem(nt,mx,my);
  ni.vx=(a.vx+b.vx)*0.08; ni.vy=(a.vy+b.vy)*0.08-0.5;
  ni.flash=32; setCool(ni,520); items.push(ni);
  const pts=PTS[nt-1]; score+=pts; merges++;
  if(nt>maxTier)maxTier=nt;
  const prevU=unlockedDropTier; onMergeUnlock(nt); if(unlockedDropTier>prevU)sndUnlock();
  const now=Date.now();
  if(now<comboEndAt)combo++;else combo=1;
  comboEndAt=now+2800; if(combo>maxCombo)maxCombo=combo;
  spawnParts(mx,my,TD[nt-1].c,10+Math.min(nt,15));
  sndMerge(nt);
  const fsz=Math.max(11,Math.round((12+Math.min(nt,12))*GW/720));
  addFloat(mx,my-ni.r-10,'+'+pts.toLocaleString(),TD[nt-1].c,fsz);
  if(combo>=2)addFloat(mx,my-ni.r-30,'×'+combo+' COMBO!','#FFD700',Math.max(9,Math.round(10*GW/720)));
  if(unlockedDropTier>prevU)addFloat(mx,my-ni.r-50,'🔓 T'+nt+' UNLOCKED!','#00FFCC',Math.max(9,Math.round(9*GW/720)));
  mFlash.txt=TD[nt-1].n+(nt>=9?' !!!':'!');
  mFlash.col=TD[nt-1].c; mFlash.tmr=70;
  try{window.parent.postMessage({type:'MERGE',tier:nt,score,merges,maxTier,combo,maxCombo,unlockedDropTier},'*');}catch(e){}
  hudPost();
}

// ════════════════════════════════════════════════════
//  GAME OVER
// ════════════════════════════════════════════════════
function checkGO(){
  if(gameOver||items.length<1){goDangerSince=0;return;}
  const{DANGER}=getC(); let inDanger=false;
  for(const it of items){
    if(it.merging||it.cool)continue;
    if(Math.hypot(it.vx,it.vy)<0.45&&it.y-it.r<DANGER){inDanger=true;break;}
  }
  const now=Date.now();
  if(inDanger){
    if(goDangerSince===0)goDangerSince=now;
    if(now-goDangerSince>=GO_WARN_MS)triggerGO();
  }else{
    goDangerSince=0;
  }
}
function dangerRatio(){ return goDangerSince ? Math.min(1,(Date.now()-goDangerSince)/GO_WARN_MS) : 0; }

function triggerGO(){
  gameOver=true; goTime=performance.now();
  if(score>best)best=score;
  goDangerSince=0; sndGameOver();
  try{window.parent.postMessage({type:'GAMEOVER',score,best,merges},'*');}catch(e){}
  hudPost();
}

function restart(){
  items=[];mergeQ=[];parts=[];floats=[];
  score=0;merges=0;maxTier=1;combo=0;maxCombo=0;
  comboEndAt=0;dropReadyAt=0;mFlash.tmr=0;
  gameOver=false;goTime=0;goDangerSince=0;
  unlockedDropTier=1; totalGames++;
  shake.power=0;shake.ox=0;shake.oy=0;
  shake.nextAt=Date.now()+35000;
  shake.rndNextAt=Date.now()+15000;
  ai.state='wait';ai.tmr=60;ai.targetId=-1;
  if(GW){ai.x=GW/2;ai.tx=GW/2;}
  resetDropQueue();
  try{window.parent.postMessage({type:'RESTART',totalGames},'*');}catch(e){}
  hudPost();
}

// ════════════════════════════════════════════════════
//  PARTICLES + FLOATS
// ════════════════════════════════════════════════════
function spawnParts(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, spd=1.5+Math.random()*6;
    parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1.2,r:1.5+Math.random()*4,life:1,dec:.019+Math.random()*.014,col});
  }
}
function tickParts(){ parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.93;p.vy=p.vy*.93+.07;p.life-=p.dec;return p.life>0&&p.y<GH+30;}); }
function addFloat(x,y,txt,col,sz){ floats.push({x,y,txt,col,sz:sz||13,life:1.4,vy:-.82}); }
function tickFloats(){ floats=floats.filter(f=>{f.y+=f.vy;f.life-=.015;return f.life>0;}); }

// ════════════════════════════════════════════════════
//  HUD
// ════════════════════════════════════════════════════
function hudPost(){
  window._gd={score,best,merges,maxTier,totalGames,nextT,afterT,items:items.length,unlockedDropTier,maxCombo};
  try{window.parent.postMessage({type:'HUD',...window._gd},'*');}catch(e){}
}
setInterval(()=>{
  const s=Math.floor((Date.now()-sessStart)/1000);
  if(window._gd){
    window._gd.sess=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
    window._gd.items=items.length;
  }
},1000);

// ════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════
function render(){
  if(!GW||!GH)return;
  const{WALL,FLOOR,DANGER,DROPY}=getC();
  const now=Date.now();
  const dR=dangerRatio();
  const sx=shake.ox, sy=shake.oy;

  cx.fillStyle='#06061A'; cx.fillRect(0,0,GW,GH);

  // Shake translate — everything inside this save/restore shakes
  cx.save();
  cx.translate(sx, sy);

  // Grid
  cx.fillStyle='rgba(255,255,255,.014)';
  for(let x=30;x<GW;x+=30) for(let y=30;y<GH;y+=30) cx.fillRect(x,y,1,1);
  cx.fillStyle='rgba(0,0,18,.022)';
  for(let y=0;y<GH;y+=3) cx.fillRect(0,y,GW,1);

  // Walls
  cx.fillStyle='#0C0C2E';
  cx.fillRect(0,0,WALL,GH); cx.fillRect(GW-WALL,0,WALL,GH); cx.fillRect(0,GH-WALL,GW,WALL);
  cx.strokeStyle='#18184A'; cx.lineWidth=1; cx.strokeRect(.5,.5,GW-1,GH-1);

  // Danger zone
  if(!gameOver){
    cx.save();
    const pulse=.18+Math.sin(now*.005)*.07;
    cx.fillStyle=`rgba(255,18,18,${.032+dR*.08})`;
    cx.fillRect(WALL,0,GW-WALL*2,DANGER);
    cx.strokeStyle=`rgba(255,${Math.round(70-dR*50)},${Math.round(70-dR*60)},${pulse+dR*.36})`;
    cx.setLineDash([8,5]); cx.lineWidth=1.4+dR*1.4;
    cx.beginPath(); cx.moveTo(WALL,DANGER); cx.lineTo(GW-WALL,DANGER); cx.stroke();
    cx.setLineDash([]);
    cx.font='bold 9px monospace'; cx.textAlign='right'; cx.textBaseline='alphabetic';
    cx.fillStyle=`rgba(255,75,75,${pulse+dR*.25+.08})`;
    cx.fillText('☠ DANGER',GW-WALL-4,DANGER-3);
    cx.restore();
  }

  // Items
  for(const it of items) drawItem(it, it.merging ? 0.25 : 1.0);

  // Particles
  cx.save();
  for(const p of parts){
    cx.globalAlpha=p.life;
    cx.beginPath(); cx.arc(p.x,p.y,Math.max(.4,p.r*p.life),0,Math.PI*2);
    cx.fillStyle=p.col; cx.fill();
  }
  cx.restore();

  // Float texts
  cx.save(); cx.textAlign='center';
  for(const f of floats){
    const a=Math.min(1,f.life); if(a<=0)continue;
    cx.globalAlpha=a;
    cx.font='bold '+f.sz+'px monospace'; cx.textBaseline='middle';
    cx.lineWidth=3; cx.strokeStyle='rgba(0,0,0,.92)';
    cx.strokeText(f.txt,f.x,f.y); cx.fillStyle=f.col; cx.fillText(f.txt,f.x,f.y);
  }
  cx.restore();

  // Merge flash
  if(mFlash.tmr>0&&!gameOver){
    mFlash.tmr--;
    const fr=70-mFlash.tmr;
    let a=fr<8?fr/8:fr<50?1:1-(fr-50)/20; a=Math.max(0,a)*.82;
    cx.save(); cx.globalAlpha=a;
    const fsz=Math.max(13,Math.round(17*GW/720));
    cx.font='bold '+fsz+'px monospace'; cx.textAlign='center'; cx.textBaseline='middle';
    cx.lineWidth=5; cx.strokeStyle='rgba(0,0,0,.97)';
    cx.strokeText(mFlash.txt,GW/2,GH*.47);
    cx.fillStyle=mFlash.col; cx.fillText(mFlash.txt,GW/2,GH*.47);
    cx.restore();
  }

  // Shake label
  if(shake.labelT>0){
    shake.labelT--;
    const a=Math.min(1,shake.labelT/20)*Math.min(1,(90-shake.labelT)/10+.1);
    cx.save(); cx.globalAlpha=a*0.9;
    const fsz=Math.max(16,Math.round(22*GW/720));
    cx.font='bold '+fsz+'px monospace'; cx.textAlign='center'; cx.textBaseline='middle';
    cx.lineWidth=6; cx.strokeStyle='rgba(0,0,0,.97)';
    cx.strokeText(shake.label,GW/2,GH*0.30);
    cx.fillStyle='#FFD700'; cx.fillText(shake.label,GW/2,GH*0.30);
    cx.restore();
  }

  // AI guide + drop preview
  if(!gameOver){
    cx.save();
    const ax=clamp(ai.x,WALL+4,GW-WALL-4); const nr=TR(nextT);
    cx.strokeStyle='rgba(255,255,255,.048)'; cx.setLineDash([4,7]); cx.lineWidth=1;
    cx.beginPath(); cx.moveTo(ax,WALL+1); cx.lineTo(ax,DROPY-2); cx.stroke(); cx.setLineDash([]);
    cx.fillStyle='rgba(255,255,255,.30)'; cx.beginPath();
    cx.moveTo(ax,DROPY); cx.lineTo(ax-5,DROPY-11); cx.lineTo(ax+5,DROPY-11); cx.fill();
    cx.restore();
    drawAt(nextT,ax,DROPY+nr,.58);
  }

  // Unlock bar
  if(!gameOver){
    cx.save();
    const barH=16,barY=GH-WALL-barH-2,barW=GW-WALL*2;
    cx.fillStyle='rgba(0,0,0,.48)'; cx.fillRect(WALL,barY,barW,barH);
    for(let t=1;t<=MAX_DROP_TIER;t++){
      const bw=barW/MAX_DROP_TIER,bx=WALL+(t-1)*bw;
      cx.fillStyle=TD[t-1].c+(t<=unlockedDropTier?'BB':'22');
      cx.fillRect(bx+1,barY+2,bw-2,barH-4);
    }
    cx.font='bold 7px monospace'; cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillStyle='rgba(255,255,255,.45)';
    cx.fillText('DROP POOL  T1–'+Math.min(unlockedDropTier,MAX_DROP_TIER),GW/2,barY+barH*.5);
    cx.restore();
  }

  // Score overlay
  if(!gameOver){
    cx.save();
    const fsz=Math.max(9,Math.round(11*GW/720));
    cx.font='bold '+fsz+'px monospace'; cx.textAlign='left'; cx.textBaseline='top';
    const lbl='SCORE '+score.toLocaleString()+'  MERGE '+merges+'  BEST '+best.toLocaleString();
    const tw=cx.measureText(lbl).width;
    cx.fillStyle='rgba(0,0,0,.62)'; cx.fillRect(WALL,WALL,tw+10,fsz+5);
    cx.fillStyle='#FFD700'; cx.fillText(lbl,WALL+5,WALL+2);
    cx.restore();
  }

  // End shake translate
  cx.restore();

  // Game over (outside shake layer — stays stable)
  if(gameOver){
    const el=(performance.now()-goTime)/1000, secs=Math.max(0,Math.ceil(5-el));
    cx.save();
    cx.fillStyle='rgba(4,4,18,.9)'; cx.fillRect(0,0,GW,GH);
    cx.textAlign='center'; cx.textBaseline='middle';
    const f1=Math.round(36*GW/720),f2=Math.round(18*GW/720),f3=Math.round(12*GW/720);
    cx.font='bold '+f1+'px monospace'; cx.fillStyle='#FF3366';
    cx.fillText('💀 GAME OVER',GW/2,GH*.32);
    cx.font='bold '+f2+'px monospace'; cx.fillStyle='#FFD700';
    cx.fillText('SCORE: '+score.toLocaleString(),GW/2,GH*.32+f1*1.5);
    if(score>0&&score>=best){
      cx.font='bold '+f3+'px monospace'; cx.fillStyle='#FFD700';
      cx.fillText('🏆 NEW BEST SCORE!',GW/2,GH*.32+f1*1.5+f2*1.7);
    }
    cx.font=f3+'px monospace'; cx.fillStyle='#444';
    cx.fillText('Restart dalam '+secs+'...',GW/2,GH*.32+f1*1.5+f2*3.3);
    cx.restore();
  }
}

function drawItem(it, alpha){
  const img=IMGS[it.tier], r=it.r, sz=r*2.15;
  cx.save(); cx.globalAlpha=(alpha==null)?1:alpha;
  if(img&&img.complete&&img.naturalWidth>0){
    cx.drawImage(img, it.x-sz/2, it.y-sz/2, sz, sz);
  }else{
    const d=TD[it.tier-1];
    const poly=POLY[it.tier];
    cx.beginPath();
    cx.moveTo(it.x+poly[0].x*r, it.y+poly[0].y*r);
    for(let i=1;i<poly.length;i++) cx.lineTo(it.x+poly[i].x*r, it.y+poly[i].y*r);
    cx.closePath();
    const g=cx.createRadialGradient(it.x-r*.2,it.y-r*.2,r*.06,it.x,it.y,r);
    g.addColorStop(0,d.c+'88'); g.addColorStop(1,d.c+'1C');
    cx.fillStyle=g; cx.fill();
    cx.strokeStyle=d.c; cx.lineWidth=2.5; cx.stroke();
    cx.font='bold '+Math.max(9,Math.round(r*.28))+'px monospace';
    cx.fillStyle='rgba(255,255,255,.75)'; cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText(it.tier, it.x, it.y);
  }
  if(it.flash>0){
    const f=it.flash/32, fr=1+f*.24;
    const poly=POLY[it.tier];
    cx.beginPath();
    cx.moveTo(it.x+poly[0].x*r*fr, it.y+poly[0].y*r*fr);
    for(let i=1;i<poly.length;i++) cx.lineTo(it.x+poly[i].x*r*fr, it.y+poly[i].y*r*fr);
    cx.closePath();
    cx.strokeStyle=`rgba(255,255,255,${f*.82})`; cx.lineWidth=r*.18; cx.stroke();
  }
  cx.restore();
}

function drawAt(tier,x,y,a){
  const r=TR(tier),img=IMGS[tier],sz=r*2.15;
  cx.save(); cx.globalAlpha=a||1;
  if(img&&img.complete&&img.naturalWidth>0){
    cx.drawImage(img,x-sz/2,y-sz/2,sz,sz);
  }else{
    const d=TD[tier-1]; const poly=POLY[tier];
    cx.beginPath();
    cx.moveTo(x+poly[0].x*r,y+poly[0].y*r);
    for(let i=1;i<poly.length;i++) cx.lineTo(x+poly[i].x*r,y+poly[i].y*r);
    cx.closePath();
    cx.fillStyle=d.c+'30'; cx.fill(); cx.strokeStyle=d.c; cx.lineWidth=2; cx.stroke();
  }
  cx.restore();
}

// ════════════════════════════════════════════════════
//  INIT + LOOP
// ════════════════════════════════════════════════════
resize();
ai.x=GW/2; ai.tx=GW/2;
// FIX: proper initial timestamps (not 0 which fires immediately)
shake.nextAt    = Date.now() + 40000;
shake.rndNextAt = Date.now() + 15000;
resetDropQueue();
hudPost();

function loop(){
  if(!gameOver){
    physics(); aiTick(); checkGO(); shakeScheduler(); tickParts(); tickFloats();
  }else{
    if(performance.now()-goTime>5000) restart();
  }
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
