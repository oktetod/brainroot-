// Radius: scales with viewport width, bigger for higher tiers
function TR(t) {
  if (!GW) return 14 + (t-1)*5;
  return Math.max(9, Math.round((13 + (t-1)*6) * GW / 720));
}

// ═══════════════════════════════════════════════════
//  PROGRESSIVE TIER UNLOCK
//  Starts at 1. Each merge of tier N unlocks tier N+1 for dropping.
//  Spawn pool grows: only tiers 1..min(unlockedDropTier, 8) appear.
// ═══════════════════════════════════════════════════
let unlockedDropTier = 1; // highest tier that can appear in drops
const MAX_DROP_TIER  = 8; // never drop tier >8 (game balance)

function rndDropTier() {
  const pool = Math.min(unlockedDropTier, MAX_DROP_TIER);
  // Weighted: lower tiers more frequent
  const weights = [];
  for (let t = 1; t <= pool; t++) weights.push(Math.max(1, pool - t + 2));
  const total = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * total;
  for (let t = 1; t <= pool; t++) {
    r -= weights[t-1];
    if (r <= 0) return t;
  }
  return 1;
}

function onMergeUnlock(newTier) {
  // Unlock next tier for dropping
  if (newTier > unlockedDropTier && newTier <= MAX_DROP_TIER + 1) {
    unlockedDropTier = Math.min(newTier, MAX_DROP_TIER);
  }
}

// ═══════════════════════════════════════════════════
//  PHYSICS CONSTANTS
// ═══════════════════════════════════════════════════
const GRAV = 0.50, SUB = 8, BNCE = 0.040, FRIC = 0.72;
let _C = null;
function getC() {
  if (_C) return _C;
  const W = Math.max(4, Math.round(GW * 0.008));
  _C = {
    WALL  : W,
    FLOOR : GH - W,
    DANGER: Math.round(GH * 0.16),
    DROPY : Math.round(GH * 0.09),
  };
  return _C;
}

// ═══════════════════════════════════════════════════
//  AUDIO — auto-on, no click needed
// ═══════════════════════════════════════════════════
let sfxCtx = null;
const bgm = new Audio();
let bgmIdx = 0;
bgm.volume = 0.42;
bgm.loop = false;
bgm.addEventListener('ended', () => {
  bgmIdx = (bgmIdx + 1) % 5;
  bgm.src = `bgm/${bgmIdx + 1}.mp3`;
  bgm.play().catch(() => {});
});

function startAudio() {
  if (sfxCtx) return;
  try { sfxCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  bgm.src = 'bgm/1.mp3';
  bgm.play().catch(() => {});
}

// Auto-start on any user interaction OR immediately if allowed
function tryAutoStart() {
  startAudio();
  document.removeEventListener('click',    tryAutoStart);
  document.removeEventListener('keydown',  tryAutoStart);
  document.removeEventListener('touchstart',tryAutoStart);
}
document.addEventListener('click',     tryAutoStart, {once:true});
document.addEventListener('keydown',   tryAutoStart, {once:true});
document.addEventListener('touchstart',tryAutoStart, {once:true});
// Try immediately (works in some browsers without gesture)
setTimeout(() => { try { startAudio(); } catch(e) {} }, 100);

function tone(f, dur, tp, vol, dl) {
  if (!sfxCtx) return;
  try {
    if (sfxCtx.state === 'suspended') sfxCtx.resume();
    const o = sfxCtx.createOscillator(), g = sfxCtx.createGain();
    o.connect(g); g.connect(sfxCtx.destination);
    o.type = tp || 'sine'; o.frequency.value = f;
    const t = sfxCtx.currentTime + (dl || 0);
    g.gain.setValueAtTime(vol || .28, t);
    g.gain.exponentialRampToValueAtTime(.0001, t + dur);
    o.start(t); o.stop(t + dur + .01);
  } catch(e) {}
}
const NOTES = [262,294,330,349,392,440,494,523,587,659,698,784,880,988,1047,1175,1319,1397,1568,1760,1976,2093,2349,2637,2794,3136,3520,3951,4186,4699];
function sndMerge(t) {
  const f = NOTES[Math.min(t-1, NOTES.length-1)];
  tone(f, .20, 'sine', .32);
  if (t >= 3)  tone(f*1.5, .16, 'triangle', .12, .02);
  if (t >= 6)  tone(f*2,   .22, 'sine',     .09, .04);
  if (t >= 10) tone(f*2.5, .26, 'sawtooth', .07, .06);
  if (t >= 15) for (let i=0;i<3;i++) tone(f*(1.5+i*.5), .36, 'sawtooth', .05, i*.05);
  if (t >= 20) for (let i=0;i<5;i++) tone(f*(1+i*.2),   .5,  'sine',     .08, i*.04);
  if (t >= 25) for (let i=0;i<7;i++) tone(f*(1+i*.16),  .72, 'sawtooth', .10, i*.038);
}
function sndDrop()     { tone(200,.06,'sine',.10); tone(130,.10,'sine',.06,.03); }
function sndGameOver() { [523,415,349,262,196,131].forEach((f,i)=>tone(f,.38,'sawtooth',.28,i*.2)); }
function sndUnlock()   { [523,659,784,1047].forEach((f,i)=>tone(f,.14,'triangle',.18,i*.09)); }

// ═══════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════
let items=[], mergeQ=[], parts=[], floats=[];
let nextT=1, afterT=1, eid=0;
let score=0, best=0, merges=0, maxTier=1, totalGames=0;
let gameOver=false, goTime=0;
let mFlash={txt:'',col:'#fff',tmr:0};
let combo=0, maxCombo=0, comboEndAt=0, dropReadyAt=0;
let goWarnFrames=0;
const GO_WARN  = 60;
const MAXITM   = 55;
const sessStart = Date.now();

function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function ri(n)          { return Math.floor(Math.random()*n); }
function mkItem(tier,x,y){ return{id:eid++,tier,x,y,vx:0,vy:0,r:TR(tier),flash:0,merging:false,sched:false,cool:true}; }
function setCool(it,ms)  { it.cool=true; setTimeout(()=>{it.cool=false;},ms||400); }

// Init first two drops
function resetDropQueue() {
  nextT  = rndDropTier();
  afterT = rndDropTier();
}

// ═══════════════════════════════════════════════════
//  SMART AI PLAYER
// ═══════════════════════════════════════════════════
const ai = { x: 0, tx: 0, state:'wait', tmr:60, ph:0, targetId:-1 };

// Score a candidate target item
function scoreTarget(it) {
  const {DANGER, FLOOR} = getC();
  if (it.merging || it.cool || it.tier !== nextT) return -1;
  const spd = Math.hypot(it.vx, it.vy);
  if (spd > 6) return -1; // moving too fast, skip
  // Prefer: low on board (safe), settled, near center
  const depthScore  = (it.y / GH) * 40;           // deeper = better
  const settleScore = Math.max(0, 10 - spd * 2);   // slower = better
  const safeScore   = it.y - it.r > DANGER ? 15 : -20; // below danger = bonus
  return depthScore + settleScore + safeScore;
}

// Find best target on board for current nextT
function findBestTarget() {
  let best = null, bestScore = 5; // minimum threshold
  for (const it of items) {
    const s = scoreTarget(it);
    if (s > bestScore) { bestScore = s; best = it; }
  }
  return best;
}

// Find if there's an obvious pair (two same-tier items close together)
function findBestPair() {
  const matching = items.filter(it => !it.merging && !it.cool && it.tier === nextT && Math.hypot(it.vx,it.vy) < 4);
  if (matching.length < 2) return null;
  // Find pair with smallest horizontal distance
  let bestPair = null, bestDist = Infinity;
  for (let i=0;i<matching.length;i++) {
    for (let j=i+1;j<matching.length;j++) {
      const d = Math.abs(matching[i].x - matching[j].x);
      if (d < bestDist) { bestDist=d; bestPair=[matching[i],matching[j]]; }
    }
  }
  return bestPair;
}

function aiTick() {
  if (!GW) return;
  const {WALL, DANGER} = getC();
  const r = TR(nextT);

  // Smooth organic movement
  ai.ph += 0.033;
  const wobble = Math.sin(ai.ph*1.3)*.6 + Math.sin(ai.ph*.7)*.3;
  ai.x += (ai.tx - ai.x)*.11 + wobble*.35 + (Math.random()-.5)*.2;
  ai.x = clamp(ai.x, r+WALL+2, GW-WALL-r-2);

  ai.tmr--;

  switch (ai.state) {
    case 'wait':
      if (ai.tmr <= 0) { ai.state='analyze'; ai.tmr=8+ri(20); }
      break;

    case 'analyze': {
      // === SMART DECISION ===
      const pair   = findBestPair();
      const target = findBestTarget();

      if (pair) {
        // Best case: two matching items → aim between them
        const midX = (pair[0].x + pair[1].x) * 0.5;
        ai.tx = clamp(midX + (Math.random()-.5)*8, r+WALL+4, GW-WALL-r-4);
        ai.state = 'aim_precise'; ai.tmr = 10+ri(22);
      } else if (target) {
        // Single match: aim directly over it
        ai.tx = clamp(target.x + (Math.random()-.5)*12, r+WALL+4, GW-WALL-r-4);
        ai.state = 'aim_precise'; ai.tmr = 12+ri(28);
        ai.targetId = target.id;
      } else {
        // No match: strategic random placement
        // Prefer dropping near existing items of adjacent tiers
        const nearTier = items.filter(it => !it.merging && it.tier <= nextT+1 && it.y > DANGER);
        if (nearTier.length > 0 && Math.random() < .55) {
          const pick = nearTier[ri(nearTier.length)];
          ai.tx = clamp(pick.x + (Math.random()-.5)*40, r+WALL+4, GW-WALL-r-4);
        } else {
          // Prefer columns that aren't too full
          ai.tx = clamp(GW*(.15+Math.random()*.7), r+WALL+4, GW-WALL-r-4);
        }
        ai.state = 'aim_loose'; ai.tmr = 18+ri(40);
      }
      break;
    }

    case 'aim_precise':
      // Re-verify target is still valid
      if (ai.targetId >= 0) {
        const t = items.find(it => it.id === ai.targetId);
        if (t && !t.merging && !t.cool && Math.hypot(t.vx,t.vy)<3) {
          // Track moving target with small lag (human-like)
          ai.tx += (t.x - ai.tx) * 0.08;
          ai.tx = clamp(ai.tx, r+WALL+4, GW-WALL-r-4);
        }
      }
      ai.x += (Math.random()-.5)*.8; // tiny hand shake
      if (ai.tmr <= 0) { ai.state='drop'; ai.tmr=3+ri(7); }
      break;

    case 'aim_loose':
      ai.x += (Math.random()-.5)*1.2;
      if (ai.tmr <= 0) { ai.state='drop'; ai.tmr=4+ri(10); }
      break;

    case 'drop':
      if (ai.tmr <= 0) {
        doDrop();
        ai.state='wait';
        // Pause longer after precise drops (simulate thinking)
        const pair2 = findBestPair();
        ai.tmr = pair2 ? 30+ri(50) : 55+ri(95);
        ai.targetId = -1;
      }
      break;
  }
}

function doDrop() {
  const {WALL, DROPY} = getC();
  if (Date.now() < dropReadyAt || gameOver || items.length >= MAXITM) return;
  const r = TR(nextT);
  const x = clamp(ai.x, r+WALL+1, GW-WALL-r-1);
  const it = mkItem(nextT, x, DROPY+r);
  it.vy = 1.4;
  setCool(it, 350);
  items.push(it);
  nextT  = afterT;
  afterT = rndDropTier();
  dropReadyAt = Date.now() + 480;
  sndDrop();
  hudPost();
}

// ═══════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════
function physics() {
  const {WALL, FLOOR, DROPY} = getC();
  const now = performance.now();

  // Process merge queue
  const rdy = mergeQ.filter(m => now - m.t >= 90);
  mergeQ    = mergeQ.filter(m => now - m.t  < 90);
  rdy.forEach(m => doMerge(m.a, m.b));

  const dt = 1 / SUB;
  for (let s = 0; s < SUB; s++) {
    // Integrate
    for (const it of items) {
      if (it.merging) continue;
      it.vy += GRAV*dt; it.x += it.vx*dt; it.y += it.vy*dt;
    }
    // Constraints
    for (const it of items) {
      if (it.merging) continue;
      if (it.x-it.r < WALL)       { it.x=WALL+it.r;     it.vx= Math.abs(it.vx)*BNCE; }
      if (it.x+it.r > GW-WALL)    { it.x=GW-WALL-it.r;  it.vx=-Math.abs(it.vx)*BNCE; }
      if (it.y+it.r > FLOOR)      { it.y=FLOOR-it.r;    it.vy=-Math.abs(it.vy)*BNCE; it.vx*=FRIC; }
      if (it.y-it.r < DROPY)      { it.y=DROPY+it.r;    if(it.vy<0)it.vy=0; }
    }
    // Circle-circle collision
    const n = items.length;
    for (let i=0;i<n;i++) {
      const a=items[i]; if(a.merging)continue;
      for (let j=i+1;j<n;j++) {
        const b=items[j]; if(b.merging)continue;
        const dx=b.x-a.x, dy=b.y-a.y;
        const d2=dx*dx+dy*dy, md=a.r+b.r;
        if (d2>=md*md||d2<.0001) continue;
        const d=Math.sqrt(d2), nx=dx/d, ny=dy/d;
        // Same tier → merge
        if (a.tier===b.tier && a.tier<MAXT && !a.cool&&!b.cool&&!a.sched&&!b.sched) {
          a.sched=true; b.sched=true; a.merging=true; b.merging=true;
          mergeQ.push({a,b,t:performance.now()}); continue;
        }
        // Push apart (no bias)
        const ov=(md-d)*.5;
        a.x-=nx*ov; a.y-=ny*ov; b.x+=nx*ov; b.y+=ny*ov;
        // Impulse
        const rv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
        if(rv>=0)continue;
        const imp=-(1+BNCE)*rv*.5;
        a.vx-=imp*nx; a.vy-=imp*ny; b.vx+=imp*nx; b.vy+=imp*ny;
      }
    }
  }
  // Damping — heavy settle
  for (const it of items) {
    if(it.merging)continue;
    const spd=Math.hypot(it.vx,it.vy);
    if      (spd<.07){it.vx=0;it.vy=0;}
    else if (spd<1.8){it.vx*=.58;it.vy*=.58;}
    else if (spd<5)  {it.vx*=.97;it.vy*=.97;}
    else             {it.vx*=.999;it.vy*=.999;}
    it.flash=Math.max(0,it.flash-1);
  }
}

function doMerge(a, b) {
  items = items.filter(i => i!==a && i!==b);
  const nt = a.tier+1, mx=(a.x+b.x)*.5, my=(a.y+b.y)*.5;
  if (nt > MAXT) { score+=PTS[MAXT-1]; hudPost(); return; }
  const ni = mkItem(nt, mx, my);
  ni.vx=(a.vx+b.vx)*.08; ni.vy=(a.vy+b.vy)*.08-.5;
  ni.flash=32; setCool(ni,520); items.push(ni);
  const pts=PTS[nt-1];
  score+=pts; merges++;
  if(nt>maxTier) maxTier=nt;

  // Progressive unlock
  const prevUnlock = unlockedDropTier;
  onMergeUnlock(nt);
  if(unlockedDropTier > prevUnlock) sndUnlock();

  // Combo
  const now=Date.now();
  if(now<comboEndAt)combo++;else combo=1;
  comboEndAt=now+2800;
  if(combo>maxCombo)maxCombo=combo;

  spawnParts(mx,my,TD[nt-1].c,10+Math.min(nt,15));
  sndMerge(nt);

  const fsz=Math.max(11,Math.round((11+Math.min(nt,12))*GW/720));
  addFloat(mx,my-ni.r-8,'+'+pts.toLocaleString(),TD[nt-1].c,fsz);
  if(combo>=2)addFloat(mx,my-ni.r-26,'×'+combo+' COMBO!','#FFD700',Math.max(9,Math.round(10*GW/720)));
  if(unlockedDropTier>prevUnlock)addFloat(mx,my-ni.r-44,'🔓 TIER '+nt+' UNLOCKED!','#00FFCC',Math.max(9,Math.round(10*GW/720)));

  mFlash.txt=TD[nt-1].n+'!'; mFlash.col=TD[nt-1].c; mFlash.tmr=70;

  try{window.parent.postMessage({type:'MERGE',tier:nt,score,merges,maxTier,combo,unlockedDropTier},'*');}catch(e){}
  hudPost();
}

// ═══════════════════════════════════════════════════
//  GAME OVER
// ═══════════════════════════════════════════════════
function checkGO() {
  if(gameOver||items.length<2){goWarnFrames=0;return;}
  const {DANGER}=getC();
  let inDanger=false;
  for(const it of items){
    if(it.merging||it.cool)continue;
    if(Math.hypot(it.vx,it.vy)<.45&&it.y-it.r<DANGER){inDanger=true;break;}
  }
  if(inDanger){
    goWarnFrames++;
    if(goWarnFrames>=GO_WARN)triggerGO();
  }else{
    goWarnFrames=Math.max(0,goWarnFrames-3);
  }
}
function triggerGO(){
  gameOver=true;goTime=performance.now();
  if(score>best)best=score;
  goWarnFrames=0;sndGameOver();
  try{window.parent.postMessage({type:'GAMEOVER',score,best,merges},'*');}catch(e){}
  hudPost();
}
function restart(){
  items=[];mergeQ=[];parts=[];floats=[];
  score=0;merges=0;maxTier=1;combo=0;maxCombo=0;
  comboEndAt=0;dropReadyAt=0;mFlash.tmr=0;
  gameOver=false;goTime=0;goWarnFrames=0;
  unlockedDropTier=1;
  totalGames++;
  ai.state='wait';ai.tmr=60;ai.targetId=-1;
  if(GW){ai.x=GW/2;ai.tx=GW/2;}
  resetDropQueue();
  try{window.parent.postMessage({type:'RESTART',totalGames},'*');}catch(e){}
  hudPost();
}

// ═══════════════════════════════════════════════════
//  PARTICLES + FLOATS
// ═══════════════════════════════════════════════════
function spawnParts(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,spd=1.5+Math.random()*6;
    parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1.2,r:1.5+Math.random()*4,life:1,dec:.019+Math.random()*.014,col});
  }
}
function tickParts(){parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.93;p.vy=p.vy*.93+.07;p.life-=p.dec;return p.life>0&&p.y<GH+30;});}
function addFloat(x,y,txt,col,sz){floats.push({x,y,txt,col,sz:sz||13,life:1.4,vy:-.82});}
function tickFloats(){floats=floats.filter(f=>{f.y+=f.vy;f.life-=.015;return f.life>0;});}

// ═══════════════════════════════════════════════════
//  HUD via postMessage to parent (stream-layout)
// ═══════════════════════════════════════════════════
function hudPost(){
  window._gd={score,best,merges,maxTier,totalGames,nextT,afterT,items:items.length,unlockedDropTier};
  try{window.parent.postMessage({type:'HUD',...window._gd},'*');}catch(e){}
}
setInterval(()=>{
  const s=Math.floor((Date.now()-sessStart)/1000);
  if(!window._gd)window._gd={};
  window._gd.sess=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  window._gd.items=items.length;
},1000);

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
function render(){
  if(!GW||!GH)return;
  const{WALL,FLOOR,DANGER,DROPY}=getC();
  const now=Date.now();

  cx.fillStyle='#06061A';cx.fillRect(0,0,GW,GH);
  // Grid
  cx.fillStyle='rgba(255,255,255,.015)';
  for(let x=30;x<GW;x+=30)for(let y=30;y<GH;y+=30)cx.fillRect(x,y,1,1);
  // Scanlines
  cx.fillStyle='rgba(0,0,18,.025)';
  for(let y=0;y<GH;y+=3)cx.fillRect(0,y,GW,1);

  // Walls
  cx.fillStyle='#0C0C2E';
  cx.fillRect(0,0,WALL,GH);cx.fillRect(GW-WALL,0,WALL,GH);cx.fillRect(0,GH-WALL,GW,WALL);
  cx.strokeStyle='#18184A';cx.lineWidth=1;cx.strokeRect(.5,.5,GW-1,GH-1);

  // Danger zone
  if(!gameOver){
    const pulse=.18+Math.sin(now*.005)*.07;
    const wR=goWarnFrames/GO_WARN;
    cx.fillStyle=`rgba(255,18,18,${.035+wR*.09})`;
    cx.fillRect(WALL,0,GW-WALL*2,DANGER);
    cx.strokeStyle=`rgba(255,${Math.round(70-wR*50)},${Math.round(70-wR*60)},${pulse+wR*.38})`;
    cx.setLineDash([8,5]);cx.lineWidth=1.4+wR*1.4;
    cx.beginPath();cx.moveTo(WALL,DANGER);cx.lineTo(GW-WALL,DANGER);cx.stroke();
    cx.setLineDash([]);
    cx.font='bold 9px monospace';cx.textAlign='right';cx.textBaseline='alphabetic';
    cx.fillStyle=`rgba(255,75,75,${pulse+wR*.25+.08})`;
    cx.fillText('☠ DANGER',GW-WALL-4,DANGER-3);
  }

  // Items
  for(const it of items)drawItem(it,it.merging?.25:1);

  // Particles
  cx.save();
  for(const p of parts){
    cx.globalAlpha=p.life;
    cx.beginPath();cx.arc(p.x,p.y,Math.max(.4,p.r*p.life),0,Math.PI*2);
    cx.fillStyle=p.col;cx.fill();
  }
  cx.restore();

  // Float texts
  cx.save();cx.textAlign='center';
  for(const f of floats){
    const a=Math.min(1,f.life);if(a<=0)continue;
    cx.globalAlpha=a;
    cx.font='bold '+f.sz+'px monospace';cx.textBaseline='middle';
    cx.lineWidth=3;cx.strokeStyle='rgba(0,0,0,.92)';cx.strokeText(f.txt,f.x,f.y);
    cx.fillStyle=f.col;cx.fillText(f.txt,f.x,f.y);
  }
  cx.restore();

  // Merge flash (no text inside circle — only canvas center text)
  if(mFlash.tmr>0&&!gameOver){
    mFlash.tmr--;
    const fr=70-mFlash.tmr;
    let a=fr<8?fr/8:fr<50?1:1-(fr-50)/20;
    a=Math.max(0,a)*.82;
    cx.save();cx.globalAlpha=a;
    const fsz=Math.max(13,Math.round(17*GW/720));
    cx.font='bold '+fsz+'px monospace';cx.textAlign='center';cx.textBaseline='middle';
    cx.lineWidth=5;cx.strokeStyle='rgba(0,0,0,.96)';
    cx.strokeText(mFlash.txt,GW/2,GH*.47);
    cx.fillStyle=mFlash.col;cx.fillText(mFlash.txt,GW/2,GH*.47);
    cx.restore();
  }

  // AI guide line + preview
  if(!gameOver){
    const ax=clamp(ai.x,WALL+4,GW-WALL-4);
    const nr=TR(nextT);
    // Guide line
    cx.strokeStyle='rgba(255,255,255,.048)';cx.setLineDash([4,7]);cx.lineWidth=1;
    cx.beginPath();cx.moveTo(ax,WALL+1);cx.lineTo(ax,DROPY-2);cx.stroke();cx.setLineDash([]);
    // Arrow
    cx.fillStyle='rgba(255,255,255,.32)';cx.beginPath();
    cx.moveTo(ax,DROPY);cx.lineTo(ax-5,DROPY-11);cx.lineTo(ax+5,DROPY-11);cx.fill();
    // Preview ghost
    drawAt(nextT,ax,DROPY+nr,.55);
  }

  // Unlock indicator (bottom bar)
  if(!gameOver){
    const barH=18, barY=GH-WALL-barH-2;
    const barW=(GW-WALL*2);
    cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(WALL,barY,barW,barH);
    for(let t=1;t<=Math.min(unlockedDropTier,MAX_DROP_TIER);t++){
      const bw=barW/MAX_DROP_TIER;
      const bx=WALL+(t-1)*bw;
      cx.fillStyle=TD[t-1].c+(t<=unlockedDropTier?'CC':'33');
      cx.fillRect(bx+1,barY+2,bw-2,barH-4);
    }
    cx.font='bold 7px monospace';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillStyle='rgba(255,255,255,.5)';
    cx.fillText('DROP POOL: TIER 1–'+Math.min(unlockedDropTier,MAX_DROP_TIER),GW/2,barY+barH*.5);
  }

  // HUD score overlay
  if(!gameOver){
    const fsz=Math.max(9,Math.round(11*GW/720));
    cx.font='bold '+fsz+'px monospace';cx.textAlign='left';cx.textBaseline='top';
    cx.fillStyle='rgba(0,0,0,.65)';cx.fillRect(WALL,WALL,Math.round(GW*.52),fsz+4);
    cx.fillStyle='#FFD700';
    cx.fillText('SCORE '+score.toLocaleString()+'  MERGE '+merges+'  BEST '+best.toLocaleString(),WALL+4,WALL+2);
  }

  // Game over screen
  if(gameOver){
    const el=(performance.now()-goTime)/1000;
    const secs=Math.max(0,Math.ceil(5-el));
    cx.fillStyle='rgba(4,4,18,.88)';cx.fillRect(0,0,GW,GH);
    cx.textAlign='center';cx.textBaseline='middle';
    const f1=Math.round(36*GW/720),f2=Math.round(18*GW/720),f3=Math.round(12*GW/720);
    cx.font='bold '+f1+'px monospace';cx.fillStyle='#FF3366';cx.fillText('💀 GAME OVER',GW/2,GH*.32);
    cx.font='bold '+f2+'px monospace';cx.fillStyle='#FFD700';cx.fillText('SCORE: '+score.toLocaleString(),GW/2,GH*.32+f1*1.5);
    if(score>0&&score>=best){cx.font='bold '+f3+'px monospace';cx.fillStyle='#FFD700';cx.fillText('🏆 NEW BEST SCORE!',GW/2,GH*.32+f1*1.5+f2*1.7);}
    cx.font=f3+'px monospace';cx.fillStyle='#444';cx.fillText('Restart dalam '+secs+'...',GW/2,GH*.32+f1*1.5+f2*3.3);
  }
}

function drawItem(it,alpha){
  const img=IMGS[it.tier],r=it.r,sz=r*2.18;
  cx.save();cx.globalAlpha=(alpha==null)?1:alpha;
  if(img&&img.complete&&img.naturalWidth>0){
    cx.drawImage(img,it.x-sz/2,it.y-sz/2,sz,sz);
  }else{
    // Fallback: colored circle ONLY — no name text inside
    const d=TD[it.tier-1];
    const g=cx.createRadialGradient(it.x-r*.22,it.y-r*.22,r*.06,it.x,it.y,r);
    g.addColorStop(0,d.c+'90');g.addColorStop(1,d.c+'1A');
    cx.beginPath();cx.arc(it.x,it.y,r,0,Math.PI*2);
    cx.fillStyle=g;cx.fill();
    cx.strokeStyle=d.c;cx.lineWidth=2.2;cx.stroke();
    // Only tier number, small, at bottom of circle
    cx.font='bold '+Math.max(7,Math.round(r*.22))+'px monospace';
    cx.fillStyle='rgba(255,255,255,.7)';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('T'+it.tier,it.x,it.y+r*.55);
  }
  // Flash ring
  if(it.flash>0){
    const f=it.flash/32;
    cx.beginPath();cx.arc(it.x,it.y,r*(1+f*.26),0,Math.PI*2);
    cx.strokeStyle=`rgba(255,255,255,${f*.84})`;cx.lineWidth=r*.18;cx.stroke();
  }
  cx.restore();
}

function drawAt(tier,x,y,a){
  const r=TR(tier),img=IMGS[tier],sz=r*2.18;
  cx.save();cx.globalAlpha=a||1;
  if(img&&img.complete&&img.naturalWidth>0){cx.drawImage(img,x-sz/2,y-sz/2,sz,sz);}
  else{
    const d=TD[tier-1];
    cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);
    cx.fillStyle=d.c+'35';cx.fill();cx.strokeStyle=d.c;cx.lineWidth=2;cx.stroke();
  }
  cx.restore();
}

// ═══════════════════════════════════════════════════
//  INIT + LOOP
// ═══════════════════════════════════════════════════
resize();
ai.x=GW/2; ai.tx=GW/2;
resetDropQueue();
hudPost();

function loop(){
  _C=null; // invalidate per-frame
  if(!gameOver){
    physics();aiTick();checkGO();tickParts();tickFloats();
  }else{
    if(performance.now()-goTime>5000)restart();
  }
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
