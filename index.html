<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#03030f;color:#fff;font-family:'Courier New',monospace;overflow:hidden;width:1280px;height:720px;user-select:none;}
#header{height:52px;background:linear-gradient(90deg,#100010,#001018,#100010);border-bottom:2px solid #FFD700;display:flex;align-items:center;padding:0 16px;gap:14px;position:relative;z-index:20;}

#merge-toast.show{transform:translate(-50%,-50%) scale(1) rotate(0deg);}
#go-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(3,3,15,0.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:40;}
.go-skull{font-size:72px;animation:goShake 0.35s ease infinite;}

#audio-btn{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);border:1px solid rgba(255,215,0,0.5);color:#FFD700;font-size:11px;padding:5px 16px;border-radius:20px;z-index:50;cursor:pointer;letter-spacing:1px;animation:promptpulse 2s ease infinite;}

<body>
<div id="header">
  <div class="live-badge">● LIVE</div>
  <div class="header-title">🇮🇹 ITALIAN BRAINROT DROP &amp; MERGE 🇮🇹</div>

</div>

<script>
// ══════════════════════════════════════════════════════════════
//  PIXEL SHADER TEXTURES  – pre-rendered offscreen canvas per tier
// ══════════════════════════════════════════════════════════════
const TEX_SIZE = 128; // px per texture

function noise(x, y) {
  const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
  x -= Math.floor(x); y -= Math.floor(y);
  const u = x*x*(3-2*x), v = y*y*(3-2*y);
  const a = (X*374761393 + Y*668265263) & 0xffffffff;
  const b = ((X+1)*374761393 + Y*668265263) & 0xffffffff;
  const c = (X*374761393 + (Y+1)*668265263) & 0xffffffff;
  const d = ((X+1)*374761393 + (Y+1)*668265263) & 0xffffffff;
  const hash = n => ((n ^ (n>>13)) * 1274126177 & 0xffffffff) / 0xffffffff;
  return hash(a)*(1-u)*(1-v) + hash(b)*u*(1-v) + hash(c)*(1-u)*v + hash(d)*u*v;
}
function fbm(x,y,oct=4){let v=0,a=0.5;for(let i=0;i<oct;i++){v+=a*noise(x,y);x*=2.1;y*=2.1;a*=0.5;}return v;}

// Each shader: (nx,ny,d) → [r,g,b]  where nx,ny ∈ [-1,1], d = dist from center
const SHADERS = [
  // T1 TRALALERO – ocean depth, bioluminescent stripe
  (nx,ny,d)=>{
    const stripe = Math.abs(Math.sin(ny*8 + nx*3));
    const wave = fbm(nx*3,ny*3)*0.5;
    const r = Math.floor((0.05 + stripe*0.25 + wave*0.1)*255);
    const g = Math.floor((0.25 + stripe*0.35 + wave*0.15)*255);
    const b = Math.floor((0.85 + stripe*0.15 - d*0.2)*255);
    return [Math.min(255,r), Math.min(255,g), Math.min(255,b)];
  },
  // T2 BOMBARDINO – military hex camo green
  (nx,ny,d)=>{
    const hex = Math.abs(Math.sin(nx*7)*Math.cos(ny*7));
    const n = fbm(nx*4+1, ny*4+1)*0.6;
    const camo = hex > 0.6 ? 0.4 : hex > 0.3 ? 0.7 : 0.55;
    const r = Math.floor((0.1 + n*0.15)*camo*255);
    const g = Math.floor((0.5 + n*0.2)*camo*255);
    const b = Math.floor((0.08 + n*0.05)*camo*255);
    return [Math.min(255,r), Math.min(255,g), Math.min(255,b)];
  },
  // T3 PATAPIM – warm brown fur
  (nx,ny,d)=>{
    const fur = fbm(nx*6,ny*6,5);
    const dir = Math.atan2(ny,nx);
    const streak = Math.abs(Math.sin(dir*12 + fur*3));
    const r = Math.floor((0.55 + fur*0.25 + streak*0.12)*255);
    const g = Math.floor((0.32 + fur*0.15 + streak*0.07)*255);
    const b = Math.floor((0.10 + fur*0.08)*255);
    return [Math.min(255,r), Math.min(255,g), Math.min(255,b)];
  },
  // T4 CAPPUCCINA – coffee foam latte art swirl
  (nx,ny,d)=>{
    const ang = Math.atan2(ny,nx);
    const swirl = Math.sin(ang*5 + d*12)*0.5+0.5;
    const foam = fbm(nx*5+2,ny*5+2)*0.4;
    const r = Math.floor((0.55 + swirl*0.35 + foam*0.15)*255);
    const g = Math.floor((0.28 + swirl*0.22 + foam*0.1)*255);
    const b = Math.floor((0.08 + foam*0.08)*255);
    return [Math.min(255,r), Math.min(255,g), Math.min(255,b)];
  },
  // T5 TUNG TUNG – explosive radial burst, red fire
  (nx,ny,d)=>{
    const ang = Math.atan2(ny,nx);
    const rays = Math.abs(Math.sin(ang*10))**0.4;
    const fire = fbm(nx*4+3,ny*4+3)*0.5;
    const r = Math.floor((0.9 + rays*0.1)*255);
    const g = Math.floor((0.35*rays + fire*0.3)*255);
    const b = Math.floor((fire*0.1)*255);
    return [Math.min(255,r), Math.min(255,g), Math.min(255,b)];
  },
  // T6 BOMBOMBINI – polka dot chaos, gray/white bomb
  (nx,ny,d)=>{
    const dot1 = Math.hypot(nx%0.5-0.25, ny%0.5-0.25);
    const dot2 = Math.hypot((nx+0.25)%0.5-0.25, (ny+0.25)%0.5-0.25);
    const dots = (dot1 < 0.12 || dot2 < 0.08) ? 0.05 : 0.9;
    const r = Math.floor(dots*220);
    const g = Math.floor(dots*220);
    const b = Math.floor(dots*220);
    return [r,g,b];
  },
  // T7 LIRILI – psychedelic rainbow spiral
  (nx,ny,d)=>{
    const ang = Math.atan2(ny,nx);
    // Normalize to [0,1) — JS % can be negative with negative operands
    const spiral = (((ang/(Math.PI*2) + d*2.5) % 1) + 1) % 1;
    const hue = (spiral * 360 + 30) % 360; // now always [0,360)
    const sat = 1.0, lig = 0.55 + fbm(nx*3,ny*3)*0.15;
    const h=hue/60;
    const p=lig*(1-sat),q=lig*(1-sat*(h%1)),t2=lig*(1-sat*(1-h%1));
    const hi=((Math.floor(h)%6)+6)%6; // force [0,5] even if h is ever weird
    const [rr,gg,bb]=[[lig,t2,p],[q,lig,p],[p,lig,t2],[p,q,lig],[t2,p,lig],[lig,p,q]][hi];
    return [Math.floor(rr*255),Math.floor(gg*255),Math.floor(bb*255)];
  },
  // T8 CACCIATORE – golden eagle feathers
  (nx,ny,d)=>{
    const feather = Math.abs(Math.sin(ny*10 + nx*4));
    const n = fbm(nx*5+4,ny*5+4)*0.4;
    const r = Math.floor((0.82 + n*0.18)*255);
    const g = Math.floor((0.55 + feather*0.2 + n*0.1)*255);
    const b = Math.floor((n*0.15)*255);
    return [Math.min(255,r), Math.min(255,g), Math.min(255,b)];
  },
  // T9 GLORBO – divine white light, iridescent edge
  (nx,ny,d)=>{
    const edge = Math.max(0, d - 0.6)*2.5;
    const ang = Math.atan2(ny,nx);
    // Normalize to [0,360) — ang/(2π)*360+180 is in (0,360] but guard anyway
    const rainbow = ((ang/(Math.PI*2)*360 + 180) % 360 + 360) % 360;
    const h=rainbow/60,sat=edge,lig=0.95-d*0.15;
    const p=lig*(1-sat),q=lig*(1-sat*(h%1)),t2=lig*(1-sat*(1-h%1));
    const hi=((Math.floor(h)%6)+6)%6;
    const [rr,gg,bb]=[[lig,t2,p],[q,lig,p],[p,lig,t2],[p,q,lig],[t2,p,lig],[lig,p,q]][hi];
    const halo = fbm(nx*6,ny*6)*0.1;
    return [Math.min(255,Math.floor((rr+halo)*255)),Math.min(255,Math.floor((gg+halo)*255)),Math.min(255,Math.floor((bb+halo)*255))];
  },
];

function buildTexture(shaderFn) {
  const oc = document.createElement('canvas');
  oc.width = oc.height = TEX_SIZE;
  const octx = oc.getContext('2d');
  const img = octx.createImageData(TEX_SIZE, TEX_SIZE);
  for (let py = 0; py < TEX_SIZE; py++) {
    for (let px = 0; px < TEX_SIZE; px++) {
      const nx = (px / TEX_SIZE)*2 - 1;
      const ny = (py / TEX_SIZE)*2 - 1;
      const d = Math.sqrt(nx*nx + ny*ny);
      const i = (py*TEX_SIZE + px)*4;
      if (d > 0.97) { img.data[i+3]=0; continue; }
      const edge = d > 0.88 ? 1-(d-0.88)/0.09 : 1;
      const [r,g,b] = shaderFn(nx,ny,d);
      img.data[i]   = r;
      img.data[i+1] = g;
      img.data[i+2] = b;
      img.data[i+3] = Math.floor(edge*255);
    }
  }
  octx.putImageData(img, 0, 0);
  return oc;
}

// Pre-build all textures
const TEXTURES = SHADERS.map(s => buildTexture(s));

// ══════════════════════════════════════════════════════════════
//  CHARACTER DEFINITIONS
// ══════════════════════════════════════════════════════════════
const TIERS = [
  { t:1, name:"Tralalero Tralala",    short:"TRALALÀ",    c:"#4488FF", glow:"rgba(68,136,255,0.7)",
    melody:[[523,0.1],[587,0.08],[659,0.1],[784,0.12],[880,0.08],[784,0.1],[659,0.18],'sine'],
    // draw face OVER texture
    drawFace(C,r,t){
      // shark fin on top
      C.beginPath();C.moveTo(-r*.08,-r*.55);C.lineTo(r*.18,-r*1.05);C.lineTo(r*.42,-r*.55);
      C.closePath();C.fillStyle='#2255CC';C.fill();C.strokeStyle='#88BBFF';C.lineWidth=1.5;C.stroke();
      // cat ears
      C.fillStyle='#FF99CC';
      C.beginPath();C.moveTo(-r*.55,-r*.45);C.lineTo(-r*.78,-r*.82);C.lineTo(-r*.28,-r*.5);C.closePath();C.fill();
      C.beginPath();C.moveTo(r*.32,-r*.38);C.lineTo(r*.52,-r*.72);C.lineTo(r*.55,-r*.38);C.closePath();C.fill();
      // eyes - massive
      [[-r*.28,-r*.08],[r*.2,-r*.08]].forEach(([ex,ey])=>{
        C.beginPath();C.ellipse(ex,ey,r*.22,r*.26,0,0,Math.PI*2);C.fillStyle='#fff';C.fill();
        C.strokeStyle='#000';C.lineWidth=1.5;C.stroke();
        C.beginPath();C.arc(ex+r*.05,ey,r*.12,0,Math.PI*2);C.fillStyle='#FF1166';C.fill();
        C.beginPath();C.ellipse(ex+r*.05,ey,r*.035,r*.1,Math.sin(t*.3)*.5,0,Math.PI*2);C.fillStyle='#000';C.fill();
        C.beginPath();C.arc(ex+r*.01,ey-r*.05,r*.04,0,Math.PI*2);C.fillStyle='#fff';C.fill();
      });
      // teeth grin
      C.beginPath();C.moveTo(-r*.42,r*.22);C.quadraticCurveTo(0,r*.52,r*.4,r*.22);
      C.strokeStyle='#88CCFF';C.lineWidth=2.5;C.stroke();
      C.fillStyle='#fff';
      for(let i=0;i<6;i++){
        const tx=-r*.35+i*r*.14;
        C.beginPath();C.moveTo(tx,r*.24);C.lineTo(tx+r*.06,r*.38);C.lineTo(tx+r*.12,r*.24);C.closePath();C.fill();
      }
      // whiskers
      C.strokeStyle='rgba(255,255,255,0.7)';C.lineWidth=1.2;C.lineCap='round';
      [[-1,-.12,-.65],[-.1,.1,-.58],[1,.12,-.65],[-1,.2,-.05],[-.1,.38,-.02],[1,.2,-.05]].forEach(([sx,sy,ex])=>{
        C.beginPath();C.moveTo(sx<0?-r*.18:-r*.18,sy*r);C.lineTo(ex*r,sy*r+(Math.random()-.5)*r*.08);C.stroke();
      });
    }
  },
  { t:2, name:"Bombardino Crocodilo",  short:"BOMBARDO",   c:"#22CC66", glow:"rgba(34,204,102,0.7)",
    melody:[[110,.18],[165,.1],[220,.15],[165,.1],[110,.22],'sawtooth'],
    drawFace(C,r,t){
      // croc snout sticking out RIGHT
      const sW=r*.8,sH=r*.28;
      C.save();C.rotate(.25);
      C.fillStyle='#1a7a3a';
      C.beginPath();C.moveTo(r*.3,-sH/2);C.lineTo(r*.3+sW,-sH/3);C.lineTo(r*.3+sW,sH/3);C.lineTo(r*.3,sH/2);C.closePath();C.fill();
      C.strokeStyle='#0a4a1a';C.lineWidth=1.5;C.stroke();
      // croc teeth on snout
      C.fillStyle='#fff';
      for(let i=0;i<4;i++){const tx=r*.35+i*r*.17;C.beginPath();C.moveTo(tx,-sH*.35);C.lineTo(tx+r*.06,-sH*.6);C.lineTo(tx+r*.1,-sH*.35);C.closePath();C.fill();}
      // croc nostril
      C.beginPath();C.ellipse(r*.3+sW*.85,-sH*.15,r*.05,r*.04,0,0,Math.PI*2);C.fillStyle='#0a3a15';C.fill();
      C.restore();
      // bomb fuse on top
      C.strokeStyle='#FFD700';C.lineWidth=3;C.lineCap='round';
      C.beginPath();C.moveTo(r*.1,-r*.7);C.quadraticCurveTo(r*.45,-r*.95,r*.3,-r*1.15);C.stroke();
      // fuse spark
      const sp=Math.sin(t*8)*.5+.5;
      C.beginPath();C.arc(r*.3,-r*1.15,r*.06*sp,0,Math.PI*2);C.fillStyle=`rgba(255,200,50,${sp})`;C.fill();
      // eye - one big croc eye
      C.beginPath();C.ellipse(-r*.15,-r*.28,r*.2,r*.25,0,0,Math.PI*2);C.fillStyle='#ffe066';C.fill();
      C.strokeStyle='#000';C.lineWidth=1.5;C.stroke();
      C.beginPath();C.ellipse(-r*.15,-r*.28,r*.06,r*.18,0,0,Math.PI*2);C.fillStyle='#000';C.fill();
      C.beginPath();C.arc(-r*.2,-r*.32,r*.035,0,Math.PI*2);C.fillStyle='rgba(255,255,255,.8)';C.fill();
    }
  },
  { t:3, name:"Brr Brr Patapim",       short:"BRR BRR",    c:"#CC8833", glow:"rgba(204,136,51,0.7)",
    melody:[[262,.1],[294,.08],[262,.08],[220,.14],[196,.08],[262,.18],'triangle'],
    drawFace(C,r,t){
      // elephant trunk curling from bottom
      C.strokeStyle='#8B5A1A';C.lineWidth=r*.22;C.lineCap='round';
      C.beginPath();C.moveTo(-r*.05,r*.5);C.quadraticCurveTo(-r*.75,r*.8,-r*.55,r*1.1);C.stroke();
      // trunk tip
      C.beginPath();C.arc(-r*.55,r*1.1,r*.12,0,Math.PI*2);C.fillStyle='#7a4a12';C.fill();
      // monkey face on top area
      C.beginPath();C.ellipse(0,r*.1,r*.38,r*.35,0,0,Math.PI*2);C.fillStyle='#c8855a';C.fill();
      // big monkey eyes
      [[-r*.15,-r*.08],[r*.15,-r*.08]].forEach(([ex,ey])=>{
        C.beginPath();C.ellipse(ex,ey,r*.15,r*.18,0,0,Math.PI*2);C.fillStyle='#fff';C.fill();
        C.strokeStyle='#333';C.lineWidth=1;C.stroke();
        C.beginPath();C.arc(ex+r*.04,ey,r*.09,0,Math.PI*2);C.fillStyle='#1a0800';C.fill();
        C.beginPath();C.arc(ex,ey-r*.04,r*.035,0,Math.PI*2);C.fillStyle='rgba(255,255,255,.85)';C.fill();
      });
      // big monkey nose
      C.beginPath();C.ellipse(0,r*.12,r*.14,r*.1,0,0,Math.PI*2);C.fillStyle='#8B3A00';C.fill();
      C.beginPath();C.arc(-r*.05,r*.12,r*.04,0,Math.PI*2);C.fillStyle='#1a0000';C.fill();
      C.beginPath();C.arc(r*.05,r*.12,r*.04,0,Math.PI*2);C.fillStyle='#1a0000';C.fill();
      // monkey grin
      C.beginPath();C.arc(0,r*.25,r*.18,0,Math.PI);C.fillStyle='#8B1A00';C.fill();
      C.beginPath();C.arc(0,r*.27,r*.14,0,Math.PI);C.fillStyle='#cc5522';C.fill();
      // monkey ears
      C.fillStyle='#c8855a';C.strokeStyle='#8B5A1A';C.lineWidth=1.5;
      [[-r*.55,-r*.05],[r*.55,-r*.05]].forEach(([ex,ey])=>{
        C.beginPath();C.ellipse(ex,ey,r*.2,r*.24,0,0,Math.PI*2);C.fill();C.stroke();
        C.beginPath();C.ellipse(ex,ey,r*.12,r*.15,0,0,Math.PI*2);C.fillStyle='#ff9977';C.fill();
      });
    }
  },
  { t:4, name:"Ballerina Cappuccina",  short:"BALLERIN",   c:"#CC66AA", glow:"rgba(204,102,170,0.7)",
    melody:[[392,.12],[440,.1],[523,.14],[494,.1],[440,.1],[392,.2],'sine'],

let AC=null,audioOK=false;
function unlockAudio(){
  if(audioOK)return;
  try{AC=new(window.AudioContext||window.webkitAudioContext)();audioOK=true;document.getElementById('audio-btn').style.display='none';}catch(e){}
}
document.addEventListener('click',unlockAudio,{once:true});
setTimeout(()=>{try{if(!audioOK)unlockAudio();}catch(e){}},2500);

// Master compressor for clean output
let masterOut=null;
function getMaster(){
  if(!AC)return null;
  if(!masterOut){masterOut=AC.createDynamicsCompressor();masterOut.threshold.value=-12;masterOut.ratio.value=4;masterOut.connect(AC.destination);}
  return masterOut;
}

function playNote(freq,type,vol,start,dur,vibrato=0){
  if(!AC)return;
  const dest=getMaster();if(!dest)return;
  const osc=AC.createOscillator();const gain=AC.createGain();
  osc.type=type;
  osc.frequency.setValueAtTime(freq,start);
  osc.frequency.setValueAtTime(freq*1.02,start+dur*.3);
  osc.frequency.exponentialRampToValueAtTime(freq*.98,start+dur*.7);
  if(vibrato>0){const vib=AC.createOscillator();const vg=AC.createGain();vib.frequency.value=6;vg.gain.value=freq*vibrato;vib.connect(vg);vg.connect(osc.frequency);vib.start(start);vib.stop(start+dur+.05);}
  gain.gain.setValueAtTime(0,start);gain.gain.linearRampToValueAtTime(vol,start+.018);
  gain.gain.setValueAtTime(vol,start+dur*.6);gain.gain.exponentialRampToValueAtTime(.001,start+dur);
  osc.connect(gain);gain.connect(dest);osc.start(start);osc.stop(start+dur+.05);
}

function playMerge(tier){
  if(!AC)return;
  const mel=TIERS[tier-1].melody;
  const type=mel[mel.length-1];
  const t0=AC.currentTime+.02;
  let time=t0;const vol=.28;
  for(let i=0;i<mel.length-1;i++){
    const [freq,dur]=mel[i];
    playNote(freq,type,vol,time,dur,.02);
    // harmony
    if(tier>=5)playNote(freq*1.5,'sine',vol*.35,time,dur,.01);
    if(tier>=8)playNote(freq*2,'sine',vol*.2,time,dur,.01);
    time+=dur*.88;
  }
  // Bass hit on high tiers
  if(tier>=6){
    const bass=TIERS[tier-1].melody[0][0]*.25;
    playNote(bass,'triangle',vol*.5,t0,.3,0);
  }
}
function playDrop(){if(!AC)return;const t0=AC.currentTime;playNote(600,'sine',.06,t0,.12);playNote(180,'sine',.04,t0+.05,.1);}
function playBounce(){if(!AC)return;playNote(260,'sine',.025,AC.currentTime,.08);}

  const rm=new Set(),add=[];

  for(const a of items){
    if(a.settled){a.wobble*=0.85;a.flash=Math.max(0,a.flash-1);a.angle+=a.spin*.1;continue;}
    a.flash=Math.max(0,a.flash-1);a.wobble*=0.88;a.angle+=a.spin;
    a.vy+=GRAV;
    a.x+=a.vx;a.y+=a.vy;
    if(a.y+a.r>FLOOR){
      a.y=FLOOR-a.r;
      if(Math.abs(a.vy)>1.5)playBounce();
      a.vy=-Math.abs(a.vy)*.1;a.vx*=.8;a.wobble+=Math.abs(a.vy)*.1;
    }
    if(a.x-a.r<WALL_L){a.x=WALL_L+a.r;a.vx=Math.abs(a.vx)*.15;a.wobble+=.1;}
    if(a.x+a.r>WALL_R){a.x=WALL_R-a.r;a.vx=-Math.abs(a.vx)*.15;a.wobble+=.1;}
    const spd=Math.hypot(a.vx,a.vy);
    const onFloor=a.y+a.r>=FLOOR-1;
    let onItem=false;
    for(const b of items){if(b.id===a.id||!b.settled)continue;if(Math.hypot(a.x-b.x,a.y-b.y)<a.r+b.r+2&&a.y<b.y){onItem=true;break;}}
    if(spd<SETTLE_V&&(onFloor||onItem))a.settleN++;else a.settleN=Math.max(0,a.settleN-1);
    if(a.settleN>=SETTLE_F){a.settled=true;a.vx=0;a.vy=0;}
  }

  for(let iter=0;iter<4;iter++){
    for(let i=0;i<items.length;i++){
      const a=items[i];if(rm.has(a.id))continue;
      for(let j=i+1;j<items.length;j++){
        const b=items[j];if(rm.has(b.id))continue;
        const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),mn=a.r+b.r;
        if(d>=mn||d<.5)continue;
        if(a.tier===b.tier&&a.tier<TIERS.length&&!rm.has(a.id)&&!rm.has(b.id)){
          rm.add(a.id);rm.add(b.id);
          const nt=a.tier+1;const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
          const ni=mkItem(nt,mx,my);ni.vy=-5;ni.vx=(a.vx+b.vx)*.12;ni.flash=52;ni.wobble=1.4;
          add.push(ni);score+=nt*nt*100;merges++;
          if(nt>maxTier)maxTier=nt;
          burst(mx,my,TIERS[nt-1].c,25);showToast(nt);mergeChatMsg(TIERS[nt-1]);
          playMerge(nt);updateUI();viewerSpike();continue;
        }
        const nx=dx/d,ny2=dy/d,ov=mn-d;
        const fa=a.settled?.025:.5,fb=b.settled?.025:.5;
        if(!a.settled){a.x-=nx*ov*fa;a.y-=ny2*ov*fa;}
        if(!b.settled){b.x+=nx*ov*fb;b.y+=ny2*ov*fb;}
        if(!a.settled&&!b.settled){
          const rv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny2;
          if(rv<0){const f=.45;a.vx+=rv*nx*f;a.vy+=rv*ny2*f;b.vx-=rv*nx*f;b.vy-=rv*ny2*f;a.wobble=.2;b.wobble=.2;}
        }else if(!b.settled&&a.settled){
          const rv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny2;if(rv<0){b.vy-=rv*ny2*.2;b.settleN=0;}
        }
      }
    }
  }

  items=items.filter(i=>!rm.has(i.id)).concat(add);
  for(const it of items){if(it.settled&&it.y-it.r<DANGER){triggerGameOver();return;}}
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.92;p.vy=p.vy*.92+.12;p.life-=p.decay;return p.life>0;});
}

function burst(x,y,color,n){
  for(let i=0;i<n;i++){
    const ang=(i/n)*Math.PI*2+Math.random()*.45;const spd=3+Math.random()*7;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2.5,life:1,decay:.016+Math.random()*.024,size:2.5+Math.random()*8,color,star:Math.random()<.35});
  }
}

// ══════════════════════════════════════════════════════════════
//  DROP + AI
// ══════════════════════════════════════════════════════════════
function doDrop(){
  if(!canDrop||gameState!=='playing')return;
  const r=TR(curTier);
  const cx=Math.max(WALL_L+r,Math.min(WALL_R-r,cursorX));
  const it=mkItem(curTier,cx,DROP_Y);it.vy=3;
  items.push(it);playDrop();
  curTier=nxtTier;nxtTier=pickTier();
  canDrop=false;dropCD=28;
}

function findTarget(){
  const r=TR(curTier);
  const matches=items.filter(it=>it.tier===curTier&&it.settled);
  if(matches.length>0&&Math.random()<.74){
    const pick=matches[Math.floor(Math.random()*matches.length)];
    return Math.max(WALL_L+r,Math.min(WALL_R-r,pick.x+(Math.random()-.5)*18));
  }
  const segs=8,sw=GW/segs,cnt=new Array(segs).fill(0);
  items.forEach(it=>{const s=Math.floor((it.x-GX1)/sw);if(s>=0&&s<segs)cnt[s]++;});
  let minC=Infinity,bestS=0;cnt.forEach((c,i)=>{if(c<minC){minC=c;bestS=i;}});
  return Math.max(WALL_L+r,Math.min(WALL_R-r,GX1+(bestS+.2+Math.random()*.6)*sw+(Math.random()-.5)*40));
}

function aiStep(){
  if(gameState!=='playing')return;frame++;
  aiMoodT--;if(aiMoodT<=0){const rv=Math.random();aiMood=rv<.28?'excited':rv<.5?'hesitant':'normal';aiMoodT=90+Math.floor(Math.random()*180);}
  const spd=aiMood==='excited'?.14:aiMood==='hesitant'?.042:.082;
  cursorX+=(aiTarget-cursorX)*spd+(Math.random()-.5)*1.5;
  if(!canDrop){dropCD--;if(dropCD<=0)canDrop=true;return;}
  aiTimer--;
  if(aiTimer<=12&&!aiReady){aiTarget=findTarget();aiReady=true;if(Math.random()<.2)aiHesitate=10+Math.floor(Math.random()*25);}
  if(aiHesitate>0){aiHesitate--;cursorX+=(Math.random()-.5)*4;return;}
  if(aiReady&&aiTimer<=0){if(Math.abs(cursorX-aiTarget)<18){doDrop();aiReady=false;const base=aiMood==='excited'?28:aiMood==='hesitant'?78:46;aiTimer=base+Math.floor(Math.random()*52);}}
}

// ══════════════════════════════════════════════════════════════
//  RENDERING
// ══════════════════════════════════════════════════════════════
let bgOff=0;
const BGWORDS=["MAMMA MIA","TRALALÀ","SIGMA","OHIO","BRAINROT","MEWING","SKIBIDI","RIZZ","GYATT","GLORBO","PATAPIM","TUNG TUNG","MAREMMA MAIALA"];
const BGDEC=Array.from({length:15},()=>({x:GX1+Math.random()*GW,y:Math.random()*H,txt:BGWORDS[Math.floor(Math.random()*BGWORDS.length)],alpha:.02+Math.random()*.03,size:10+Math.floor(Math.random()*22),ang:(Math.random()-.5)*.5,col:TIERS[Math.floor(Math.random()*TIERS.length)].c}));

function drawBg(){
  ctx.fillStyle='#05050f';ctx.fillRect(0,0,W,H);
  bgOff=(bgOff+.18)%60;
  ctx.strokeStyle='rgba(255,255,255,.015)';ctx.lineWidth=1;
  for(let x=GX1+bgOff%60;x<GX2;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=bgOff%60;y<H;y+=60){ctx.beginPath();ctx.moveTo(GX1,y);ctx.lineTo(GX2,y);ctx.stroke();}
  BGDEC.forEach(d=>{ctx.save();ctx.globalAlpha=d.alpha;ctx.translate(d.x,d.y);ctx.rotate(d.ang);ctx.font=`bold ${d.size}px 'Courier New'`;ctx.fillStyle=d.col;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(d.txt,0,0);ctx.restore();});
  ctx.globalAlpha=1;
  const lg=ctx.createLinearGradient(0,0,GX1,0);lg.addColorStop(0,'rgba(3,3,15,1)');lg.addColorStop(1,'rgba(3,3,15,0)');
  ctx.fillStyle=lg;ctx.fillRect(0,0,GX1,H);
  const rg=ctx.createLinearGradient(GX2,0,W,0);rg.addColorStop(0,'rgba(3,3,15,0)');rg.addColorStop(1,'rgba(3,3,15,1)');
  ctx.fillStyle=rg;ctx.fillRect(GX2,0,W-GX2,H);
}

function drawChar(r,tier,angle,flash,isPreview){
  const td=TIERS[tier-1];
  const fl=flash/52;

  // Glow aura
  const gs=fl>0?fl*.9:(tier>=7?.32:.12);
  if(gs>0.05){
    const gr=ctx.createRadialGradient(0,0,r*.3,0,0,r*1.9);
    const ha=Math.floor(gs*75).toString(16).padStart(2,'0');
    gr.addColorStop(0,td.c+ha);gr.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(0,0,r*1.9,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
  }

  // Texture from pixel shader
  const tex=TEXTURES[tier-1];
  ctx.save();
  ctx.beginPath();ctx.arc(0,0,r*.97,0,Math.PI*2);ctx.clip();
  ctx.rotate(angle*.5);
  ctx.drawImage(tex,-r,-r,r*2,r*2);
  ctx.restore();

  // Face drawing (not clipped – allows ears/fins to stick out)
  ctx.save();
  if(!isPreview||r>25)td.drawFace(ctx,r,frame*.04);
  ctx.restore();

  // Border ring
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
  ctx.strokeStyle=fl>0?'#fff':td.c;ctx.lineWidth=fl>0?3.5:2;ctx.stroke();

  // Flash overlay
  if(fl>0){ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${fl*.45})`;ctx.fill();}

  // Tier badge
  const br=Math.max(9,r*.26),bx=r*.65,by=-r*.65;
  ctx.beginPath();ctx.arc(bx,by,br+2,0,Math.PI*2);ctx.fillStyle='#03030f';ctx.fill();
  ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.strokeStyle=td.c;ctx.lineWidth=1.5;ctx.stroke();
  ctx.font=`bold ${br*1.4}px monospace`;ctx.fillStyle=fl>0?'#fff':td.c;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(tier,bx,by);
}

function drawWalls(){
  const dg=ctx.createLinearGradient(0,0,0,DANGER);dg.addColorStop(0,'rgba(255,0,0,.18)');dg.addColorStop(1,'rgba(255,0,0,0)');
  ctx.fillStyle=dg;ctx.fillRect(GX1,0,GW,DANGER);
  ctx.strokeStyle='rgba(255,30,30,.52)';ctx.lineWidth=1.5;ctx.setLineDash([8,6]);
  ctx.beginPath();ctx.moveTo(GX1,DANGER);ctx.lineTo(GX2,DANGER);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,30,30,.58)';ctx.font='bold 8px Courier New';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('⚠ DANGER',GX1+5,DANGER-8);
  ctx.strokeStyle='rgba(255,215,0,.32)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(WALL_L,0);ctx.lineTo(WALL_L,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(WALL_R,0);ctx.lineTo(WALL_R,H);ctx.stroke();
  const fg=ctx.createLinearGradient(0,FLOOR-5,0,H);fg.addColorStop(0,'rgba(255,215,0,.5)');fg.addColorStop(1,'rgba(255,215,0,.06)');
  ctx.fillStyle=fg;ctx.fillRect(WALL_L,FLOOR-5,WALL_R-WALL_L,H-(FLOOR-5));
}

function drawSidePanels(){
  const lp=8,lw=GX1-lp-5,lcx=lp+lw/2;
  ctx.fillStyle='rgba(255,215,0,.055)';ctx.fillRect(lp,lp,lw,120);
  ctx.strokeStyle='rgba(255,215,0,.18)';ctx.lineWidth=1;ctx.strokeRect(lp,lp,lw,120);
  ctx.fillStyle='#555';ctx.font='9px Courier New';ctx.textAlign='center';ctx.fillText('HOLDING',lcx,22);
  ctx.save();ctx.translate(lcx,68);drawChar(Math.min(30,TR(curTier)*.7),curTier,0,0,true);ctx.restore();
  ctx.fillStyle=TIERS[curTier-1].c;ctx.font='bold 8px Courier New';ctx.textAlign='center';ctx.fillText(TIERS[curTier-1].short,lcx,112);

  const rp=GX2+5,rw=W-GX2-10,rcx=rp+rw/2;
  ctx.fillStyle='rgba(255,215,0,.055)';ctx.fillRect(rp,lp,rw,120);
  ctx.strokeStyle='rgba(255,215,0,.18)';ctx.lineWidth=1;ctx.strokeRect(rp,lp,rw,120);
  ctx.fillStyle='#555';ctx.font='9px Courier New';ctx.textAlign='center';ctx.fillText('NEXT',rcx,22);
  ctx.save();ctx.translate(rcx,68);drawChar(Math.min(28,TR(nxtTier)*.65),nxtTier,0,0,true);ctx.restore();
  ctx.fillStyle=TIERS[nxtTier-1].c;ctx.font='bold 8px Courier New';ctx.textAlign='center';ctx.fillText(TIERS[nxtTier-1].short,rcx,112);

  ctx.fillStyle='rgba(255,215,0,.045)';ctx.fillRect(rp,135,rw,95);
  ctx.strokeStyle='rgba(255,215,0,.12)';ctx.lineWidth=1;ctx.strokeRect(rp,135,rw,95);
  ctx.textAlign='center';
  ctx.fillStyle='#444';ctx.font='8px Courier New';ctx.fillText('SCORE',rcx,148);
  ctx.fillStyle='#FFD700';ctx.font='bold 13px monospace';ctx.fillText(score.toLocaleString(),rcx,162);
  ctx.fillStyle='#444';ctx.font='8px Courier New';ctx.fillText('MERGES',rcx,178);
  ctx.fillStyle='#00FF99';ctx.font='bold 13px monospace';ctx.fillText(merges,rcx,192);
  const bt=maxTier>0?TIERS[maxTier-1]:null;
  ctx.fillStyle='#444';ctx.font='8px Courier New';ctx.fillText('BEST',rcx,208);
  ctx.fillStyle=bt?bt.c:'#333';ctx.font='bold 10px Courier New';ctx.fillText(bt?bt.short:'—',rcx,220);
}

function drawCursor(){
  if(!canDrop||gameState!=='playing')return;
  const r=TR(curTier),cx=Math.max(WALL_L+r,Math.min(WALL_R-r,cursorX));
  ctx.setLineDash([5,10]);ctx.strokeStyle='rgba(255,215,0,.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx,DROP_Y+r);ctx.lineTo(cx,FLOOR);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#FFD700';ctx.shadowColor='#FFD700';ctx.shadowBlur=10;
  ctx.beginPath();ctx.moveTo(cx,10);ctx.lineTo(cx-10,24);ctx.lineTo(cx+10,24);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  ctx.globalAlpha=.5;ctx.save();ctx.translate(cx,DROP_Y);drawChar(r,curTier,0,0,true);ctx.restore();ctx.globalAlpha=1;
}

function drawParticles(){
  for(const p of particles){
    ctx.save();ctx.globalAlpha=p.life;
    if(p.star){
      ctx.translate(p.x,p.y);ctx.fillStyle=p.color;const s=p.size*p.life;
      ctx.beginPath();for(let i=0;i<5;i++){const a=i/5*Math.PI*2-Math.PI/2,a2=a+Math.PI/5;ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s);ctx.lineTo(Math.cos(a2)*s*.4,Math.sin(a2)*s*.4);}
      ctx.closePath();ctx.fill();
    }else{ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();}
    ctx.restore();
  }
}

function render(){
  drawBg();drawWalls();drawSidePanels();
  for(const it of items){
    ctx.save();ctx.translate(it.x,it.y);
    ctx.rotate(Math.sin(it.angle*2)*it.wobble*.1);
    drawChar(it.r,it.tier,it.angle,it.flash,false);
    ctx.restore();
    // name label
    const fs=Math.max(7,Math.min(10,it.r*.22));
    ctx.font=`bold ${fs}px 'Courier New'`;ctx.fillStyle=TIERS[it.tier-1].c;
    ctx.textAlign='center';ctx.textBaseline='top';ctx.shadowColor=TIERS[it.tier-1].c;ctx.shadowBlur=4;
    ctx.fillText(TIERS[it.tier-1].short,it.x,it.y+it.r+2);ctx.shadowBlur=0;
  }
  drawParticles();drawCursor();
}

let toastT;

  el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);
}

function triggerGameOver(){
  if(gameState==='gameover')return;gameState='gameover';
  document.getElementById('go-overlay').style.display='flex';
  document.getElementById('go-score-txt').textContent=`Score: ${score.toLocaleString()}  |  Merges: ${merges}  |  Best: ${maxTier>0?TIERS[maxTier-1].name:'—'}`;
  addChat('NOOOOO GAME OVER 😭😭😭','rip');addChat('RIPBOZO 💀 F in chat','rip');addChat(`bro scored ${score.toLocaleString()} sheesh`,'rip');
  let cd=5;const el=document.getElementById('go-cd');
  const iv=setInterval(()=>{cd--;el.textContent=`RESTARTING IN ${cd}...`;if(cd<=0){clearInterval(iv);restartGame();}},1000);
}

function restartGame(){
  items=[];particles=[];score=0;merges=0;maxTier=0;gameState='playing';
  cursorX=GX1+GW/2;curTier=pickTier();nxtTier=pickTier();
  canDrop=true;dropCD=0;aiTarget=GX1+GW/2;aiTimer=70;aiReady=false;aiMood='normal';aiMoodT=100;aiHesitate=0;
  document.getElementById('go-overlay').style.display='none';document.getElementById('merge-toast').classList.remove('show');
  updateUI();addChat('NEW GAME!! TRALALERO TRALALALA 🔥🇮🇹','hype');
}
